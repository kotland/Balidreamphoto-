<style>
/* Catalog-specific inline styles */
.catalog-header { font-family:'Playfair Display',serif; text-align:center; margin:20px 0; font-size:24px; }
.catalog-subtitle { text-align:center; color:rgba(42,42,40,0.5); margin-bottom:24px; }
.filter-label { color:#2a6b5a; font-size:12px; font-weight:600; letter-spacing:2px; margin-bottom:8px; }
.filter-section { margin-top:16px; }
.scroll-chips { display:flex; flex-wrap:wrap; gap:8px; }
.results-count { color:rgba(42,42,40,0.4); font-size:13px; margin-bottom:12px; }
.place-badge { display:inline-block; font-size:11px; font-weight:700; padding:4px 8px; border-radius:6px; margin-bottom:8px; }
.badge-top { background:#fff9e6; color:#b38a00; border:1px solid rgba(179,138,0,0.2); }
.badge-dish { margin-top:12px; padding-top:12px; border-top:1px dashed rgba(0,0,0,0.1); font-size:13px; color:rgba(42,42,40,0.8); background:none; display:block; }

/* Loader */
.loader-wrap { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:60px 0; }
.loader { width:36px; height:36px; border:3px solid rgba(42,107,90,0.15); border-top-color:#2a6b5a; border-radius:50%; animation:spin .8s linear infinite; }
@keyframes spin { to { transform:rotate(360deg); } }
.loader-text { margin-top:12px; font-size:13px; color:rgba(42,42,40,0.4); }

/* Infinite scroll sentinel */
.scroll-sentinel { height:1px; }
</style>
</head>

// ══════════════════════════════════════
//  CHIP RENDERING
// ══════════════════════════════════════

function renderChips(containerId, items, onClickFn) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const fragment = document.createDocumentFragment();
  items.forEach(item => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = item.emoji ? item.emoji + ' ' + (item.label || item.key) : item.label || item.key;
    chip.addEventListener('click', () => onClickFn(item.key, chip));
    fragment.appendChild(chip);
  });
  container.innerHTML = '';
  container.appendChild(fragment);
}

function clearChipsSelection(containerId) {
  document.querySelectorAll('#' + containerId + ' .chip').forEach(c => c.classList.remove('selected'));
}

function selectChip(el) {
  el.classList.add('selected');
}


// ══════════════════════════════════════
//  STATE MANAGEMENT
// ══════════════════════════════════════

function updateFilter(key, value) {
  state[key] = value;

  // Cascade resets
  if (key === 'district') {
    state.category = '';
    state.budget = '';
    state.shopType = '';
    state.cuisine = '';
    state.galleryType = '';
    state.wowType = '';
    showSection('catalogCategoryPicker', true);
    showSection('catalogBudgetPicker', false);
    showSection('catalogShopFilter', false);
    showSection('catalogCuisineFilter', false);
    showSection('catalogGalleryFilter', false);
    showSection('catalogWowFilter', false);
    clearChipsSelection('categoryChips');
    clearChipsSelection('budgetChips');
    clearChipsSelection('shopChips');
    clearChipsSelection('cuisineChips');
    clearChipsSelection('galleryChips');
    clearChipsSelection('wowChips');
  }

  if (key === 'category') {
    state.budget = '';
    state.shopType = '';
    state.cuisine = '';
    state.galleryType = '';
    state.wowType = '';
    clearChipsSelection('budgetChips');
    clearChipsSelection('shopChips');
    clearChipsSelection('cuisineChips');
    clearChipsSelection('galleryChips');
    clearChipsSelection('wowChips');

    // Show smart sub-filters
    showSection('catalogBudgetPicker', false);
    showSection('catalogShopFilter', false);
    showSection('catalogCuisineFilter', false);
    showSection('catalogGalleryFilter', false);
    showSection('catalogWowFilter', false);

    if (value === 'еда') {
      showSection('catalogCuisineFilter', true);
      showSection('catalogBudgetPicker', true);
    } else if (value === 'продукты' || value === 'жильё') {
      showSection('catalogBudgetPicker', true);
    } else if (value === 'шоппинг') {
      showSection('catalogShopFilter', true);
    } else if (value === 'галерея') {
      showSection('catalogGalleryFilter', true);
    } else if (value === 'вау') {
      showSection('catalogWowFilter', true);
    } else {
      showSection('catalogBudgetPicker', true);
    }
  }

  applyFiltersAndRender();
}

function showSection(id, visible) {
  const el = document.getElementById(id);
  if (el) el.style.display = visible ? 'block' : 'none';
}


// ══════════════════════════════════════
//  FILTERING
// ══════════════════════════════════════

function matchDistrict(pDistrict, filterD) {
  if (!filterD) return true;
  const subs = DISTRICT_SUBS[filterD];
  if (subs) return subs.indexOf(pDistrict) !== -1;
  return pDistrict === filterD;
}

function matchCuisine(p, cuisineFilter) {
  if (!cuisineFilter) return true;
  if (cuisineFilter === 'вегетарианское') return !!p.vegan;
  if (p.cuisine && p.cuisine === cuisineFilter) return true;
  // Keyword fallback
  const d = ((p.desc || '') + ' ' + (p.signatureDish || '')).toLowerCase();
  const n = (p.name || '').toLowerCase();
  const keywords = CUISINE_MAP[cuisineFilter];
  if (!keywords) return false;
  for (let i = 0; i < keywords.length; i++) {
    if (d.indexOf(keywords[i]) !== -1 || n.indexOf(keywords[i]) !== -1) return true;
  }
  return false;
}

function matchGallery(p, galleryFilter) {
  if (!galleryFilter) return true;
  const d = (p.desc || '').toLowerCase();
  const n = (p.name || '').toLowerCase();
  const hasMuseum = d.indexOf('музей') !== -1 || n.indexOf('музей') !== -1 || d.indexOf('museum') !== -1;
  if (galleryFilter === 'музей') return hasMuseum;
  if (galleryFilter === 'галерея') return !hasMuseum;
  return true;
}

function matchWow(p, wowFilter) {
  if (!wowFilter) return true;
  const d = (p.desc || '').toLowerCase();
  const n = (p.name || '').toLowerCase();
  const wkeys = WOW_MAP[wowFilter];
  if (!wkeys) return false;
  for (let i = 0; i < wkeys.length; i++) {
    if (d.indexOf(wkeys[i]) !== -1 || n.indexOf(wkeys[i]) !== -1) return true;
  }
  return false;
}

function matchShopType(p, shopFilter) {
  if (!shopFilter) return true;
  if (!p.tags) return false;
  return p.tags.indexOf(shopFilter) !== -1;
}

function filterPlaces() {
  return PLACES.filter(p => {
    if (!matchDistrict(p.district, state.district)) return false;
    if (state.category && p.category !== state.category) return false;
    if (state.budget && p.budget !== state.budget) return false;
    if (!matchShopType(p, state.shopType)) return false;
    if (!matchCuisine(p, state.cuisine)) return false;
    if (!matchGallery(p, state.galleryType)) return false;
    if (!matchWow(p, state.wowType)) return false;
    return true;
  });
}


// ══════════════════════════════════════
//  RENDERING (with pagination)
// ══════════════════════════════════════

function pluralMest(n) {
  const last = n % 10;
  const last2 = n % 100;
  if (last2 >= 11 && last2 <= 19) return 'мест';
  if (last === 1) return 'место';
  if (last >= 2 && last <= 4) return 'места';
  return 'мест';
}

function renderCard(p) {
  const card = document.createElement('div');
  card.className = 'place';

  let html = '';

  // Top Choice badge
  if (p.isTopChoice) {
    html += '<div class="place-badge badge-top">⭐️ Выбор большинства</div>';
  }

  html += '<div class="place-name">' + escapeHtml(p.name) + '</div>';
  html += '<div class="place-desc">' + escapeHtml(p.desc) + (p.price ? ' · ' + escapeHtml(p.price) : '') + '</div>';

  // Signature dish
  if (p.signatureDish) {
    html += '<div class="badge-dish">🍽 Стоит попробовать: ' + escapeHtml(p.signatureDish) + '</div>';
  }

  if (p.maps) {
    html += '<div class="place-meta">📍 <a href="' + escapeHtml(p.maps) + '" target="_blank">Maps</a></div>';
  }

  card.innerHTML = html;
  return card;
}

function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function renderNextBatch() {
  const results = document.getElementById('catalogResults');
  const start = state.renderedCount;
  const end = Math.min(start + PAGE_SIZE, state.filteredPlaces.length);

  if (start >= state.filteredPlaces.length) return;

  const fragment = document.createDocumentFragment();
  for (let i = start; i < end; i++) {
    fragment.appendChild(renderCard(state.filteredPlaces[i]));
  }
  results.appendChild(fragment);
  state.renderedCount = end;
}

function applyFiltersAndRender() {
  state.filteredPlaces = filterPlaces();
  state.renderedCount = 0;

  const results = document.getElementById('catalogResults');
  const n = state.filteredPlaces.length;

  // Clear and add count
  results.innerHTML = '<div class="results-count">' + n + ' ' + pluralMest(n) + '</div>';

  // Render first batch
  renderNextBatch();
}


// ══════════════════════════════════════
//  INFINITE SCROLL (IntersectionObserver)
// ══════════════════════════════════════

let observer = null;

function setupInfiniteScroll() {
  const sentinel = document.getElementById('scrollSentinel');
  if (!sentinel) return;

  observer = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting && state.renderedCount < state.filteredPlaces.length) {
      renderNextBatch();
    }
  }, { rootMargin: '200px' });

  observer.observe(sentinel);
}


// ══════════════════════════════════════
//  EVENT HANDLERS
// ══════════════════════════════════════

function onDistrictClick(key, el) {
  clearChipsSelection('districtChips');
  selectChip(el);
  updateFilter('district', key);
}

function onCategoryClick(key, el) {
  clearChipsSelection('categoryChips');
  selectChip(el);
  updateFilter('category', key);
}

function onBudgetClick(key, el) {
  clearChipsSelection('budgetChips');
  selectChip(el);
  updateFilter('budget', key);
}

function onShopClick(key, el) {
  clearChipsSelection('shopChips');
  selectChip(el);
  updateFilter('shopType', key);
}

function onCuisineClick(key, el) {
  clearChipsSelection('cuisineChips');
  selectChip(el);
  updateFilter('cuisine', key);
}

function onGalleryClick(key, el) {
  clearChipsSelection('galleryChips');
  selectChip(el);
  updateFilter('galleryType', key);
}

function onWowClick(key, el) {
  clearChipsSelection('wowChips');
  selectChip(el);
  updateFilter('wowType', key);
}


// ══════════════════════════════════════
//  INITIALIZATION
// ══════════════════════════════════════

function init() {
  // Render all chip sets
  renderChips('districtChips', DISTRICT_CONFIG, onDistrictClick);
  renderChips('categoryChips', CATEGORY_CONFIG, onCategoryClick);
  renderChips('budgetChips', BUDGET_CONFIG, onBudgetClick);
  renderChips('shopChips', SHOP_CONFIG, onShopClick);
  renderChips('cuisineChips', CUISINE_CONFIG, onCuisineClick);
  renderChips('galleryChips', GALLERY_CONFIG, onGalleryClick);
  renderChips('wowChips', WOW_CONFIG, onWowClick);

  // Load data
  fetch('data/places_ru.json')
    .then(r => {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(data => {
      PLACES = data;
      document.getElementById('placeCount').textContent = PLACES.length + '+ проверенных мест';
      document.getElementById('loader').remove();
      setupInfiniteScroll();
      // Don't render anything until user selects a district
    })
    .catch(err => {
      document.getElementById('loader').innerHTML =
        '<div style="color:#c0392b;font-size:14px">Ошибка загрузки данных. Обновите страницу.</div>';
      console.error('Failed to load places:', err);
    });
}

init();
</script>
