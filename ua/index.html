<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Свої на Балі</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="../style.css">
</head>
<body>
<div class="grad1"></div><div class="grad2"></div><div class="grad3"></div>
<div class="app">
<div id="passwordOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:#f8f6f2;z-index:99999;display:flex;align-items:center;justify-content:center">
<div style="text-align:center;padding:20px">
<div style="font-size:48px;margin-bottom:20px">🔒</div>
<h1 style="font-family:'Playfair Display',serif;font-size:28px;margin-bottom:8px">Закритий доступ</h1>
<p style="color:rgba(42,42,40,0.5);margin-bottom:30px">Введіть код для входу</p>
<input type="text" id="accessCode" placeholder="Код" style="width:150px;padding:14px 20px;border:2px solid rgba(42,107,90,0.2);border-radius:14px;font-size:18px;text-align:center;outline:none;font-family:Inter,sans-serif" onkeyup="if(event.key==='Enter')checkAccess()">
<div style="margin-top:16px">
<button onclick="checkAccess()" style="padding:14px 40px;border-radius:14px;font-size:16px;background:linear-gradient(135deg,#2a6b5a,#3a9b7a);color:white;border:none;cursor:pointer;font-family:Inter,sans-serif;font-weight:600">Увійти</button>
</div>
<div id="codeError" style="color:#e74c3c;margin-top:12px;font-size:14px;display:none">Невірний код</div>
</div>
</div>



<!-- LANGUAGE SELECTION -->
<div id="langOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:#f8f6f2;z-index:99998;display:flex;align-items:center;justify-content:center;display:none">
<div style="text-align:center;padding:20px">
<div style="font-size:48px;margin-bottom:20px">🌍</div>
<h2 style="font-family:'Playfair Display',serif;font-size:24px;margin-bottom:24px">Choose language</h2>
<div style="display:flex;flex-direction:column;gap:12px;max-width:280px;margin:0 auto">
<button onclick="setLang('ru')" style="padding:16px 24px;border-radius:14px;border:2px solid rgba(42,107,90,0.2);background:white;font-size:16px;cursor:pointer;font-family:Inter,sans-serif">🇷🇺 Русский</button>
<button onclick="setLang('en')" style="padding:16px 24px;border-radius:14px;border:2px solid rgba(42,107,90,0.2);background:white;font-size:16px;cursor:pointer;font-family:Inter,sans-serif">🇬🇧 English</button>
<button onclick="setLang('ua')" style="padding:16px 24px;border-radius:14px;border:2px solid rgba(42,107,90,0.2);background:white;font-size:16px;cursor:pointer;font-family:Inter,sans-serif">🇺🇦 Українська</button>
<button onclick="setLang('kz')" style="padding:16px 24px;border-radius:14px;border:2px solid rgba(42,107,90,0.2);background:white;font-size:16px;cursor:pointer;font-family:Inter,sans-serif">🇰🇿 Қазақша</button>
<button onclick="setLang('ar')" style="padding:16px 24px;border-radius:14px;border:2px solid rgba(42,107,90,0.2);background:white;font-size:16px;cursor:pointer;font-family:Inter,sans-serif">🇦🇪 العربية</button>
</div>
</div>
</div>

<!-- CHOICE SCREEN -->

<div class="screen active" id="choiceScreen">
<div style="font-size:48px;text-align:center;margin:60px 0 16px">🌴</div>
<div class="title">Твій <em>гід</em> по Балі</div>
<div class="subtitle" style="margin-bottom:32px" id="choiceSubtitle">Обери, що тобі потрібно</div>
<button class="btn btn-primary" onclick="startLiving()" style="margin-bottom:12px;padding:20px 24px">
<div style="text-align:left;width:100%">
<div style="font-size:16px;font-weight:700">Де жити на Балі</div>
<div style="font-size:12px;color:rgba(42,42,40,0.5);margin-top:4px">Відпустка · 90+ маршрутів</div>
</div>
<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
</button>

<button class="btn btn-primary" onclick="openCatalog()" style="padding:20px 24px;margin-bottom:12px">
<div style="text-align:left;width:100%">
<div style="font-size:16px;font-weight:700">📍 Каталог місць</div>
<div style="font-size:12px;color:rgba(42,42,40,0.5);margin-top:4px">200+ місць за районами та категоріями</div>
</div>
<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
</button>
<button class="btn btn-primary" onclick="openBase()" style="padding:20px 24px;background:rgba(42,107,90,0.06);border:1px solid rgba(42,107,90,0.1)">
<div style="text-align:left;width:100%">
<div style="font-size:16px;font-weight:700;color:#2a6b5a">📋 Балі База</div>
<div style="font-size:12px;color:rgba(42,42,40,0.5);margin-top:4px">Небезпеки · Байк · Аптечка · Гроші · Культура</div>
</div>
<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#2a6b5a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
</button>

<div style="text-align:center;margin-top:24px">
<button onclick="localStorage.removeItem('bali_lang');showLangOverlay()" style="padding:8px 16px;border-radius:10px;border:1px solid rgba(42,107,90,0.15);background:rgba(42,107,90,0.04);font-size:13px;cursor:pointer;font-family:Inter,sans-serif;color:rgba(42,42,40,0.5)">🌍 Змінити мову</button>
</div>
</div>
<!-- START SCREEN (District filter intro) -->
</div>
<script>
function setLang(lang) {
  localStorage.setItem('bali_lang', lang);
  document.getElementById('langOverlay').style.display = 'none';
  if (lang === 'en') { window.location.href = '../en/index.html'; return; }
  if (lang === 'ua') { window.location.href = '../ua/index.html'; return; }
  if (lang === 'kz') { window.location.href = '../kz/index.html'; return; }
  if (lang === 'ar') { window.location.href = '../ar/index.html'; return; }
  // ru — stay on current page
}
function showLangOverlay() {
  if (localStorage.getItem('bali_lang')) {
    // Language already chosen — redirect if needed
    var lang = localStorage.getItem('bali_lang');
    if (lang === 'en') { window.location.href = '../en/index.html'; return; }
    if (lang === 'ua') { window.location.href = '../ua/index.html'; return; }
    if (lang === 'kz') { window.location.href = '../kz/index.html'; return; }
    if (lang === 'ar') { window.location.href = '../ar/index.html'; return; }
    return; // ru — stay
  }
  document.getElementById('langOverlay').style.display = 'flex';
}
function checkAccess(){
  var code=document.getElementById('accessCode').value.trim();
  if(code==='111'){
    localStorage.setItem('bali_access','granted');
    document.getElementById('passwordOverlay').style.display='none';
    showLangOverlay();
  } else {
    document.getElementById('codeError').style.display='block';
    setTimeout(function(){document.getElementById('codeError').style.display='none'},2000);
  }
}
if(localStorage.getItem('bali_access')==='granted'){
  var po=document.getElementById('passwordOverlay');
  if(po)po.style.display='none';
  showLangOverlay();
}
function startLiving(){ window.location.href='guides.html'; }
function openBase(){ window.location.href='base.html'; }
function openCatalog(){ window.location.href='catalog.html'; }

var CHOICE_PHRASES=['Обери, що тобі потрібно','З чого почнемо?','Що шукаєш на Балі?'];
var cSub=document.getElementById('choiceSubtitle');
if(cSub){cSub.textContent=CHOICE_PHRASES[Math.floor(Math.random()*CHOICE_PHRASES.length)];}

if(window.Telegram&&Telegram.WebApp){
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}
</script>
</body>
</html>
