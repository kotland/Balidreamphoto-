<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Интерактивная карта Бали</title>
<link href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" rel="stylesheet"/>
<link href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" rel="stylesheet"/>
<link href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" rel="stylesheet"/>
<link href="style.css?v=123" rel="stylesheet"/>
<style>
  body, html { margin: 0; padding: 0; height: 100%; font-family: Inter, sans-serif; background: #faf9f6; }
  #map { height: 100vh; width: 100%; }
  .map-header { position: absolute; top: 10px; left: 10px; right: 10px; z-index: 1000; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); padding: 15px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); border: 1px solid rgba(42, 107, 90, 0.1); display: flex; flex-direction: column; gap: 10px; }
  .filters { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn { padding: 8px 16px; background: #fff; border: 1px solid rgba(0,0,0,0.1); border-radius: 20px; font-size: 13px; font-weight: 600; color: #2a2a28; white-space: nowrap; cursor: pointer; transition: 0.2s; }
  .filter-btn.active { background: #2a6b5a; color: white; border-color: #2a6b5a; }
  .leaflet-popup-content-wrapper { border-radius: 12px; padding: 0; overflow: hidden; }
  .leaflet-popup-content { margin: 0; width: 280px !important; }
  .popup-card { padding: 16px; background: white; }
  .popup-title { font-size: 18px; font-weight: 700; color: #2a2a28; font-family: 'Playfair Display', serif; margin-bottom: 4px; }
  .popup-cat { font-size: 12px; font-weight: 600; color: #2a6b5a; text-transform: uppercase; margin-bottom: 8px; }
  .popup-desc { font-size: 13px; color: rgba(0,0,0,0.7); margin-bottom: 12px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .popup-btn { display: block; width: 100%; padding: 10px; background: #2a6b5a; color: white; text-align: center; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 14px; }
  .custom-div-icon { background: #2a6b5a; border: 2px solid white; border-radius: 50%; color: white; font-weight: bold; text-align: center; line-height: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
  .back-btn { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; background: rgba(0,0,0,0.05); border-radius: 50%; cursor: pointer; border: none; }
  .header-top { display: flex; align-items: center; gap: 15px; }
  .header-title { font-size: 18px; font-weight: 700; font-family: 'Playfair Display', serif; }
</style>
</head>
<body>
<div class="map-header">
<div class="header-top">
<button class="back-btn" onclick="window.history.back()">
<svg fill="none" height="24" stroke="#2a6b5a" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewbox="0 0 24 24" width="24"><path d="M19 12H5M12 19l-7-7 7-7"></path></svg>
</button>
<div class="header-title">Карта <span style="color:#2a6b5a;">місць</span></div>
</div>
<div class="filters" id="catFilters">
<div class="filter-btn active" onclick="filterMap('all', this)">Усі місця</div>
<div class="filter-btn" onclick="filterMap('еда', this)">Їжа</div>
<div class="filter-btn" onclick="filterMap('кофейни', this)">Кава</div>
<div class="filter-btn" onclick="filterMap('спа', this)">Спа</div>
<div class="filter-btn" onclick="filterMap('природа', this)">Природа</div>
<div class="filter-btn" onclick="filterMap('храмы', this)">Храми</div>
<div class="filter-btn" onclick="filterMap('спорт', this)">Спорт</div>
</div>
</div>
<div id="map"></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
  var map = L.map('map', { zoomControl: false }).setView([-8.5, 115.2], 10);
  
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap',
    maxZoom: 19
  }).addTo(map);

  var placesData = {"type": "FeatureCollection", "features": [{"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.14921676296767, -8.642890994758593]}, "properties": {"name": "Gedhe Leather Bali", "category": "шоппинг", "budget": "💛", "desc": "Казаки, ремни и обувь из натуральной кожи. Отшивают по вашим меркам прямо на Бали. Очень стильно и качественно.", "price": "от 1M", "maps": "https://maps.google.com/maps/search/Gedhe+Leather+Bali"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.14186534734468, -8.628159270184115]}, "properties": {"name": "BURO Bali", "category": "шоппинг", "budget": "💛", "desc": "Стильные юбки, одежда и аксессуары. Концепт-стор с отличной селекцией балийских и международных дизайнеров.", "price": "от 500K", "maps": "https://maps.google.com/maps/search/BURO+Bali"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.07927340290952, -8.799725281730318]}, "properties": {"name": "Kevala Home Uluwatu (соседний магазин)", "category": "шоппинг", "budget": "💛", "desc": "Магазин рядом с Kevala Home в Улувату. Отличные купальники, джинсовки и пляжная одежда.", "price": "от 300K", "maps": "https://maps.google.com/maps/search/Kevala+Home+Uluwatu"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.17674598292717, -8.68157579341387]}, "properties": {"name": "Balm Wears", "category": "шоппинг", "budget": "💛", "desc": "Минималистичные блузы, платья и качественная базовая одежда из натуральных тканей. Идеально для балийской жары.", "price": "", "maps": "https://maps.google.com/maps/search/Balm+Wears+Bali"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.14006431845654, -8.652994516271995]}, "properties": {"name": "Cordero Gallery", "category": "шоппинг", "budget": "💛", "desc": "Концепт-стор и галерея. Уникальные юбки, дизайнерские вещи и арт-объекты.", "price": "", "maps": "https://maps.google.com/maps/search/Cordero+Gallery+Bali"}}]};
  var markers = L.markerClusterGroup({
    showCoverageOnHover: false,
    maxClusterRadius: 40,
    iconCreateFunction: function(cluster) {
      return L.divIcon({ html: '<div><span>' + cluster.getChildCount() + '</span></div>', className: 'custom-div-icon', iconSize: L.point(34, 34) });
    }
  });
  var allLayers = [];

  function getEmoji(cat) {
      const m = {'еда':'🍽','кофейни':'☕','природа':'🌿','храмы':'🛕','спорт':'💪','спа':'🧖‍♀️','шоппинг':'🛍','активности':'🏄','пляжи':'🏖','жильё':'🏨'};
      return m[cat] || '📍';
  }

  function loadData(filterCat) {
    markers.clearLayers();
    allLayers = [];

    placesData.features.forEach(function(feature) {
      if (filterCat !== 'all' && feature.properties.category !== filterCat) return;

      var latlng = L.latLng(feature.geometry.coordinates[1], feature.geometry.coordinates[0]);
      var cat = feature.properties.category || '';
      var price = feature.properties.price ? (' • ' + feature.properties.price) : '';
      
      var popupHtml = `
        <div class="popup-card">
          <div class="popup-cat">${getEmoji(cat)} ${cat.toUpperCase()}</div>
          <div class="popup-title">${feature.properties.name}</div>
          <div style="font-size:12px; font-weight:700; margin-bottom:8px; display:flex; align-items:center;">
             <span style="background:rgba(42, 107, 90, 0.1); color:#2a6b5a; padding:2px 6px; border-radius:4px;">${feature.properties.budget}${price}</span>
          </div>
          <div class="popup-desc">${feature.properties.desc}</div>
          <a href="${feature.properties.maps}" target="_blank" class="popup-btn">Открыть в Google Maps</a>
        </div>
      `;

      var iconHtml = `<div style="background:#2a6b5a; color:white; font-size:16px; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 5px rgba(0,0,0,0.3); border:2px solid white;">${getEmoji(cat)}</div>`;
      var customIcon = L.divIcon({ html: iconHtml, className: '', iconSize: [30, 30], iconAnchor: [15, 15] });

      var marker = L.marker(latlng, { icon: customIcon }).bindPopup(popupHtml);
      markers.addLayer(marker);
      allLayers.push(marker);
    });
    
    map.addLayer(markers);
  }

  function filterMap(cat, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadData(cat);
  }

  loadData('all');
</script>
</body>
</html>
