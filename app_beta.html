руталистская вилла-космолёт в джунглях Переренана (Чангу). Полный разрыв шаблонов: никаких соломенных крыш и бамбука. Здесь вас ждут монолитный бетон, футуристичный дизайн, стеклянный потолок прямо под бассейном (вы видите плавающих людей снизу) и душ с видом на небо. <b>📎 Мой совет:</b> Идеальный вариант аренды для тех, кто ищет эстетику киберпанка и хочет жить внутри современного арт-объекта.", "maps": "https://maps.google.com/maps/search/Uchusen+Bali", "district": null}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.25592902216844, -8.333417374784407]}, "properties": {"id": 1054, "name": "Balay Villa (Cemagi)", "category": "жильё", "desc": "Скрытая жемчужина Бали — белоснежная современная средиземноморская вилла в тихом районе Чемаги (5 мин от пляжа). Идеальная эстетика минимализма: плавные арки, светлые просторные интерьеры, струящиеся ткани и приватный бассейн. Идеально для фотосессий и состояния 'slow life' вдали от пробок Чангу.", "maps": "https://maps.google.com/maps/search/Balay+Villa+Cemagi+Bali", "district": null}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.08221357761501, -8.288390340177498]}, "properties": {"id": 1055, "name": "WOODS Bali (Pererenan)", "category": "еда", "desc": "Ресторан в Переренане (Чангу), возводящий эстетику «тихой роскоши» в абсолют. Интерьер из массива дерева, зелёного бархата, мраморных столиков и потрясающих деревянных люстр. Идеальное место для неспешного, дорогого ужина или атмосферного бранча. По вечерам часто играет живой джаз. <b>📎 Мой совет:</b> бронируйте столик на джазовый вечер заранее, это незабываемо.", "maps": "https://maps.google.com/maps/search/WOODS+Bali+Pererenan", "district": null}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.27165920392206, -8.329318438492567]}, "properties": {"id": 1056, "name": "Camaya Bali (Bamboo House)", "category": "жильё", "desc": "Легендарные бамбуковые эко-дома, прославившиеся на весь мир в шоу от Netflix глей, создавая сотни маленьких каскадов. На одной локации находятся сразу 4 разных водопада! Очень живописный, пологий спуск сквозь кофейные и гвоздичные плантации. Менее туристический и невероятно кинематографичный.", "maps": "https://maps.google.com/maps/search/Banyu+Wana+Amertha+Waterfall", "district": null}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.18387964492523, -8.415213056022045]}, "properties": {"id": 1060, "name": "Leke Leke Waterfall", "category": "природа", "desc": "Самый изящный, тонкий и фотогеничный водопад (часто встречается в Pinterest). Узкий поток воды падает в скрытую пещеру, красиво обрамлённую папоротниками и бамбуком. Треккинг к нему очень лёгкий и приятный (около 15 минут по ухоженной тропе). Идеальная локация для тех, кто хочет красивых кадров без жёстких физических нагрузок.", "maps": "https://maps.google.com/maps/search/Leke+Leke+Waterfall", "district": null}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [114.99825409279465, -8.360888151452816]}, "properties": {"id": 1061, "name": "Bingin Beach", "category": "пляжи", "desc": "Один из самых эстетичных и сёрферских пляжей на всём полуострове Букит. Чтобы спуститься к бирюзовой воде, придётся преодолеть крутые ступеньки по отвесной скале. Прямо на этой скале прилеплены аутентичные кафе, бары и белые виллы с деревянными террасами, напоминающими Грецию или итальянский Амальфи. <b>📎 Мой совет:</b> приходите сюда на закат, садитесь на балкончике любого кафе с кокосом и наслаждайтесь видом на сёрферов.", "maps": "https://maps.google.com/maps/search/Bingin+Beach+Bali", "district": null}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.32672161391947, -8.292426017961114]}, "properties": {"id": 1062, "name": "Mahi Mahi Bingin (Boutique Stays)", "category": "жильё", "desc": "Бутик-отель на скалах Бингина (Улувату) с тем самым 'billion dollar view' на океан. Это место, где вы будете просыпаться под шум прибоя и провожать самые красивые, кровавые балийские закаты, не вставая с кровати. Эстетичный дорогой минимализм, деревянные детали и панорамные окна в пол. Океан буквально стучится к вам в номер. Идеальный спот для романтики и 'тихой роскоши' на Буките.", "maps": "https://maps.google.com/maps/search/Mahi+Mahi+Bingin", "district": null}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.28162141664865, -8.419031195963333]}, "properties": {"id": 1063, "name": "THAIKILA (Ubud)", "category": "шоппинг", "desc": "Стильный бутик премиальных купальников и курортной одежды в центре Убуда. Минималистичный интерьер, голый бетон и огромный выбор эстетичных моделей, которые идеально сидят по фигуре. Это бренд, который создаёт вещи, идеально вписывающиеся в вайб балийского отпуска.", "maps": "https://maps.google.com/maps/search/THAIKILA+Ubud", "district": null}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.17397896583238, -8.275005041425128]}, "properties": {"id": 1064, "name": "Pison Ubud", "category": "кофейни", "desc": "Знаменитая кофейня Pison в Убуде с просторной террасой, окружённой рисовыми полями. Интерьер сочетает тёплое дерево, соломенные крыши и современный комфорт. Идеальное место для неспешного бранча с видом на зелень. <b>🍽 Стоит попробовать:</b> Обязательно закажите их фирменный бейгл со сливочным сыром и лососем (Smoked salmon cream bagel) и освежающий Эспрессо-Матча (Espresso Matcha).", "maps": "https://maps.google.com/maps/search/Pison+Ubud", "district": null}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.12658598155325, -8.211773088275974]}, "properties": {"id": 1065, "name": "Donna (Ubud)", "category": "еда", "desc": "Роскошный ресторан и коктейль-бар для вечернего выхода. Приглушённый свет, изысканная подача блюд (файн-дайнинг) и уникальная коктейльная карта. Идеальный спот, чтобы красиво завершить день в Убуде. <b>📎 Мой совет:</b> приходите сюда вечером и обязательно попробуйте их фирменный Эспрессо Мартини — он здесь один из лучших на острове.", "maps": "https://maps.google.com/maps/search/Donna+Ubud", "district": null}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.21526446094452, -8.274850570777684]}, "properties": {"id": 1066, "name": "Jaens Spa (Ubud)", "category": "спа", "desc": "Потрясающий спа-салон с глубоким вниманием к эстетике расслабления. Просторные массажные кабинеты залиты светом благодаря огромным круглым панорамным окнам-иллюминаторам с видом на сочную зелень джунглей. После 90-минутного традиционного балийского массажа вы можете принять душ прямо в круглой мраморной ванной возле окна. Полная перезагрузка тела и мыслей.", "maps": "https://maps.google.com/maps/search/Jaens+Spa+Ubud", "district": null}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.18375915926569, -8.55047884216096]}, "properties": {"id": 1067, "name": "Pecatu Shooting Club Bali", "category": "экспириенс", "desc": "Премиальный стрелковый клуб на Буките (район Печату). Идеальный способ экологично выпустить пар и получить дозу адреналина после расслабленных дней на вилле. Огромная безопасная территория с множеством тренировочных зон (11-13 bay) и профессиональными инструкторами. Доступна стрельба из настоящего боевого оружия. <b>📎 Мой совет:</b> Если вы никогда не держали в руках оружие — не бойтесь, инструкторы работают даже с новичками.", "maps": "https://maps.google.com/maps/search/Pecatu+Shooting+Club+Bali", "district": null}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.38317538866839, -8.564142454964276]}, "properties": {"id": 1068, "name": "VIP Helicopter Tour (Bali Heli)", "category": "экспириенс", "desc": "Абсолютный апогей «тяжёлого люкса» и романтики на Бали. Полёт на частном вертолёте (Bali Heli / Air Bali) над захватывающими дух отвесными скалами Улувату, гигантской статуей Гаруды-Вишну и бирюзовым океаном. Это тот самый экспириенс, который вы запомните на всю жизнь. Идеальный сценарий для предложения руки и сердца или подарка на день рождения. <b>📎 Мой совет:</b> Бронируйте полёт строго на золотой час перед закатом — виды будут просто кинематографичными.", "maps": "https://maps.google.com/maps/search/Bali+Helicopter+Tour", "district": null}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.25704297942833, -8.246902656935923]}, "properties": {"id": 1069, "name": "Bali Fire Shooting Club (Sanur)", "category": "экспириенс", "desc": "Единственный лицензированный крытый стрелковый клуб на Бали, расположенный в Сануре. Настоящий, брутальный экспириенс с боевым оружием (пистолеты, винтовки). Полностью безопасные условия, профессиональные инструкторы и огромный арсенал на выбор. Идеальное место, чтобы сбросить напряжение, получить мощную дозу адреналина и сделать брутальные кадры. <b>📎 Мой совет:</b> Если вы устали от пляжей и медитаций, это лучший способ перезагрузить нервную систему и выпустить пар.", "maps": "https://maps.google.com/maps/search/Bali+Fire+Shooting+Club", "district": null}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.2813157153765, -8.56117755254521]}, "properties": {"id": 1070, "name": "VIP Helicopter Flights (Canggu Helipad)", "category": "экспириенс", "desc": "Ультимативный уровень «тихой роскоши» прямо из Чангу. Взлетите на частном вертолёте (Air Bali / Fly Bali) над знаменитыми пляжами с чёрным вулканическим песком, пронеситесь над серферами Эхо Бич и бескрайними рисовыми террасами на закате. Это не просто транспорт — это эксклюзивный опыт, который навсегда останется в памяти. <b>📎 Мой совет:</b> Это самая фотогеничная локация в мире для съёмок роскошного контента. Обязательно берите с собой профессионального фотографа или дроновода для бэкстейджей.", "maps": "https://maps.google.com/maps/search/Canggu+Helicopter+Flights", "district": null}}]};
  var markers = L.markerClusterGroup({
    showCoverageOnHover: false,
    maxClusterRadius: 40,
    iconCreateFunction: function(cluster) {
      return L.divIcon({ html: '<div><span>' + cluster.getChildCount() + '</span></div>', className: 'custom-div-icon', iconSize: L.point(34, 34) });
    }
  });
  var allLayers = [];

  function getEmoji(cat) {
      const m = {'еда':'🍽','кофейни':'☕','природа':'🌿','храмы':'🛕','спорт':'💪','спа':'🧖‍♀️','шоппинг':'🛍','активности':'🏄','пляжи':'🏖','жильё':'🏨'};
      return m[cat] || '📍';
  }

  function loadData(filterCat) {
    markers.clearLayers();
    allLayers = [];

    placesData.features.forEach(function(feature) {
      if (filterCat !== 'all' && feature.properties.category !== filterCat) return;

      var latlng = L.latLng(feature.geometry.coordinates[1], feature.geometry.coordinates[0]);
      var cat = feature.properties.category || '';
      var price = feature.properties.price ? (' • ' + feature.properties.price) : '';
      
      var popupHtml = `
        <div class="popup-card">
          <div class="popup-cat">${getEmoji(cat)} ${cat.toUpperCase()}</div>
          <div class="popup-title">${feature.properties.name}</div>
          <div style="font-size:12px; font-weight:700; margin-bottom:8px; display:flex; align-items:center;">
             <span style="background:rgba(42, 107, 90, 0.1); color:#2a6b5a; padding:2px 6px; border-radius:4px;">${feature.properties.budget}${price}</span>
          </div>
          <div class="popup-desc">${feature.properties.desc}</div>
          <a href="${feature.properties.maps}" target="_blank" class="popup-btn">Открыть в Google Maps</a>
        </div>
      `;

      var iconHtml = `<div style="background:#2a6b5a; color:white; font-size:16px; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 5px rgba(0,0,0,0.3); border:2px solid white;">${getEmoji(cat)}</div>`;
      var customIcon = L.divIcon({ html: iconHtml, className: '', iconSize: [30, 30], iconAnchor: [15, 15] });

      var marker = L.marker(latlng, { icon: customIcon }).bindPopup(popupHtml);
      markers.addLayer(marker);
      allLayers.push(marker);
    });
    
    map.addLayer(markers);
  }

  function filterMap(cat, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadData(cat);
  }

  loadData('all');
</script>
