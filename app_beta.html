<style>

  .leaflet-popup-content-wrapper { border-radius: 12px; padding: 0; overflow: hidden; }
  .leaflet-popup-content { margin: 0; width: 280px !important; }
  .popup-card { padding: 16px; background: white; }
  .popup-title { font-size: 18px; font-weight: 700; color: #2a2a28; font-family: 'Playfair Display', serif; margin-bottom: 4px; }
  .popup-cat { font-size: 12px; font-weight: 600; color: #2a6b5a; text-transform: uppercase; margin-bottom: 8px; }

<div class="map-header">

        </div>

            Показать все фильтры ▼
        </div>
    </div>
    <script>
    function toggleFilters() {
        var w = document.getElementById('filtersWrapper');
        var btn = document.getElementById('toggleFiltersBtn');
        var grad = document.getElementById('filterGradient');
        if (w.style.maxHeight === '40px') {
            w.style.maxHeight = '500px';
            btn.innerHTML = 'Скрыть фильтры ▲';
            grad.style.display = 'none';
        } else {
            w.style.maxHeight = '40px';
            btn.innerHTML = 'Показать все фильтры ▼';
            grad.style.display = 'block';
        }
    }
    </script>

</div>

.688909933204489]}, "properties": {"id": 1050, "name": "Parachute Bali", "category": "еда", "desc": "Средиземноморская кухня. Хумус, пита, лабне, грильное мясо. Стильный интерьер. 🍽 Стоит попробовать: Фалафель", "maps": "https://maps.google.com/maps/search/Parachute+Bali+Seminyak", "district": "seminyak"}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.19377255111193, -8.447405597673464]}, "properties": {"id": 1051, "name": "P53G C29 Jero (очищение и птицы)", "category": "экспириенс", "desc": "Скрытая жемчужина Бали — аутентичное кафе у местного дедушки (Мангку). Здесь живут экзотические птицы и животные, создавая невероятную атмосферу затерянного мира. Главная особенность: по вашему запросу дедушка может провести для вас настоящий балийский ритуал очищения (Мелукат) прямо на месте. Это очень камерный, глубокий и душевный опыт вдали от туристических толп. <b>📎 Мой совет:</b> оставляйте щедрый донат, это место держится на чистой энергии хозяина.", "maps": "https://maps.app.goo.gl/9ZzJJxvqwJMyY7RM6", "district": null}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.16986423558747, -8.418929000702516]}, "properties": {"id": 1052, "name": "LONG PLAY CAFE (Pererenan)", "category": "кофейни", "desc": "Уникальное камерное заведение в спокойном районе Переренан (Чангу) для эстетов и меломанов. Идеальный спот с All-Day завтраками, спешелти кофе и вином. Главная особенность: весь день здесь играет потрясающая коллекция виниловых пластинок (можно услышать всё — от джаза до любимых альбомов Deftones). Работают с 8:00 утра до 22:40 вечера. <b>📎 Мой совет:</b> Приходите сюда вечером на бокал вина под ламповый звук винила — это лучший способ замедлиться после шумного дня.", "maps": "https://maps.google.com/maps/search/Long+Play+Cafe+Pererenan", "district": null}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.21112029471226, -8.381263316108656]}, "properties": {"id": 1053, "name": "Uchusen Bali (Spaceship Villa)", "category": "жильё", "desc": "Секретная бруталистская вилла-космолёт в джунглях Переренана (Чангу). Полный разрыв шаблонов: никаких соломенных крыш и бамбука. Здесь вас ждут монолитный бетон, футуристичный дизайн, стеклянный потолок прямо под бассейном (вы видите плавающих людей снизу) и душ с видом на небо. <b>📎 Мой совет:</b> Идеальный вариант аренды для тех, кто ищет эстетику киберпанка и хочет жить внутри современного арт-объекта.", "maps": "https://maps.google.com/maps/search/Uchusen+Bali", "district": null}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.22004982488764, -8.384733044036272]}, "properties": {"id": 1054, "name": "Balay Villa (Cemagi)", "category": "жильё", "desc": "Скрытая жемчужина Бали — белоснежная современная средиземноморская вилла в тихом районе Чемаги (5 мин от пляжа). Идеальная эстетика минимализма: плавные арки, светлые просторные интерьеры, струящиеся ткани и приватный бассейн. Идеально для фотосессий и состояния 'slow life' вдали от пробок Чангу.", "maps": "https://maps.google.com/maps/search/Balay+Villa+Cemagi+Bali", "district": null}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.22189383208729, -8.416212788471855]}, "properties": {"id": 1055, "name": "WOODS Bali (Pererenan)", "category": "еда", "desc": "Ресторан в Переренане (Чангу), возводящий эстетику «тихой роскоши» в абсолют. Интерьер из массива дерева, зелёного бархата, мраморных столиков и потрясающих деревянных люстр. Идеальное место для неспешного, дорогого ужина или атмосферного бранча. По вечерам часто играет живой джаз. <b>📎 Мой совет:</b> бронируйте столик на джазовый вечер заранее, это незабываемо.", "maps": "https://maps.google.com/maps/search/WOODS+Bali+Pererenan", "district": null}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.15484356623358, -8.413485483070232]}, "properties": {"id": 1056, "name": "Camaya Bali (Bamboo House)", "category": "жильё", "desc": "Легендарные бамбуковые эко-дома   var markers = L.markerClusterGroup({
    showCoverageOnHover: false,
    maxClusterRadius: 40,
    iconCreateFunction: function(cluster) {
      return L.divIcon({ html: '<div><span>' + cluster.getChildCount() + '</span></div>', className: 'custom-div-icon', iconSize: L.point(34, 34) });
    }
  });
  var allLayers = [];

  function getEmoji(cat) {
      const m = {'еда':'🍽','кофейни':'☕','природа':'🌿','храмы':'🛕','спорт':'💪','спа':'🧖‍♀️','шоппинг':'🛍','активности':'🏄','пляжи':'🏖','жильё':'🏨'};
      return m[cat] || '📍';
  }

  const urlParams = new URLSearchParams(window.location.search);
const districtParam = urlParams.get('d');

function loadData(filterCat) {
    markers.clearLayers();
    allLayers = [];

    placesData.features.forEach(function(feature) {
      if (districtParam && feature.properties.district !== districtParam) return;
      if (filterCat !== 'all' && feature.properties.category !== filterCat) return;

      var latlng = L.latLng(feature.geometry.coordinates[1], feature.geometry.coordinates[0]);
      var cat = feature.properties.category || '';
      var price = feature.properties.price ? (' • ' + feature.properties.price) : '';
      
      var popupHtml = `
        <div class="popup-card">
          <div class="popup-cat">${getEmoji(cat)} ${cat.toUpperCase()}</div>
          <div class="popup-title">${feature.properties.name}</div>
          <div style="font-size:12px; font-weight:700; margin-bottom:8px; display:flex; align-items:center;">
             <span style="background:rgba(42, 107, 90, 0.1); color:#2a6b5a; padding:2px 6px; border-radius:4px;">${feature.properties.budget}${price}</span>
          </div>
          <div class="popup-desc">${feature.properties.desc}</div>
          <a href="${feature.properties.maps}" target="_blank" class="popup-btn">Открыть в Google Maps</a>
        </div>
      `;

      var iconHtml = `<div style="background:#2a6b5a; color:white; font-size:16px; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 5px rgba(0,0,0,0.3); border:2px solid white;">${getEmoji(cat)}</div>`;
      var customIcon = L.divIcon({ html: iconHtml, className: '', iconSize: [30, 30], iconAnchor: [15, 15] });

      var marker = L.marker(latlng, { icon: customIcon }).bindPopup(popupHtml);
      markers.addLayer(marker);
      allLayers.push(marker);
    });
    
        map.addLayer(markers);
    if (markers.getLayers().length > 0) {
        map.fitBounds(markers.getBounds(), {padding: [50, 50]});
    }
  }

  function filterMap(cat, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadData(cat);
  }

  const catParam = urlParams.get('c') || 'all';
    // Select the correct button in UI if possible
    document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.remove('active');
        if (catParam !== 'all' && b.innerText.toLowerCase().includes(catParam.toLowerCase())) {
            b.classList.add('active');
        } else if (catParam === 'all' && b.innerText === 'Все места') {
            b.classList.add('active');
        }
    });
    loadData(catParam);
