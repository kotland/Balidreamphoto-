  .popup-card { padding: 16px; background: white; }
  .popup-title { font-size: 18px; font-weight: 700; color: #2a2a28; font-family: 'Playfair Display', serif; margin-bottom: 4px; }
  .popup-cat { font-size: 12px; font-weight: 600; color: #2a6b5a; text-transform: uppercase; margin-bottom: 8px; }

<div class="map-header">

        </div>
        <div id="toggleFiltersBtn" onclick="toggleFilters()" style="text-align:center; font-size:12px; color:#2a6b5a; cursor:pointer; padding:4px 0; font-weight:600;">
            ⬇ Показать все фильтры
        </div>
    </div>
    <script>
    function toggleFilters() {
        var w = document.getElementById('filtersWrapper');
        var btn = document.getElementById('toggleFiltersBtn');
        var grad = document.getElementById('filterGradient');
        if (w.style.height === '32px') {
            w.style.height = 'auto'; w.style.paddingBottom = '10px';
            btn.innerHTML = '⬆ Скрыть фильтры';
            grad.style.display = 'none';
        } else {
            w.style.height = '32px'; w.style.paddingBottom = '0px';
            btn.innerHTML = '⬇ Показать все фильтры';
            grad.style.display = 'block';
        }
    }
    </script>

</div>

о вода здесь сочится прямо сквозь зелёную стену джунглей, создавая сотни маленьких каскадов. На одной локации находятся сразу 4 разных водопада! Очень живописный, пологий спуск сквозь кофейные и гвоздичные плантации. Менее туристический и невероятно кинематографичный.", "maps": "https://maps.google.com/maps/search/Banyu+Wana+Amertha+Waterfall", "district": null}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.17452058379676, -8.411295542868713]}, "properties": {"id": 1060, "name": "Leke Leke Waterfall", "category": "природа", "desc": "Самый изящный, тонкий и фотогеничный водопад (часто встречается в Pinterest). Узкий поток воды падает в скрытую пещеру, красиво обрамлённую папоротниками и бамбуком. Треккинг к нему очень лёгкий и приятный (около 15 минут по ухоженной тропе). Идеальная локация для тех, кто хочет красивых кадров без жёстких физических нагрузок.", "maps": "https://maps.google.com/maps/search/Leke+Leke+Waterfall", "district": null}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.20243072785014, -8.421242866739416]}, "properties": {"id": 1061, "name": "Bingin Beach", "category": "пляжи", "desc": "Один из самых эстетичных и сёрферских пляжей на всём полуострове Букит. Чтобы спуститься к бирюзовой воде, придётся преодолеть крутые ступеньки по отвесной скале. Прямо на этой скале прилеплены аутентичные кафе, бары и белые виллы с деревянными террасами, напоминающими Грецию или итальянский Амальфи. <b>📎 Мой совет:</b> приходите сюда на закат, садитесь на балкончике любого кафе с кокосом и наслаждайтесь видом на сёрферов.", "maps": "https://maps.google.com/maps/search/Bingin+Beach+Bali", "district": null}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.169656298576, -8.411770171041173]}, "properties": {"id": 1062, "name": "Mahi Mahi Bingin (Boutique Stays)", "category": "жильё", "desc": "Бутик-отель на скалах Бингина (Улувату) с тем самым 'billion dollar view' на океан. Это место, где вы будете просыпаться под шум прибоя и провожать самые красивые, кровавые балийские закаты, не вставая с кровати. Эстетичный дорогой минимализм, деревянные детали и панорамные окна в пол. Океан буквально стучится к вам в номер. Идеальный спот для романтики и 'тихой роскоши' на Буките.", "maps": "https://maps.google.com/maps/search/Mahi+Mahi+Bingin", "district": null}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.2122958978694, -8.401646617446897]}, "properties": {"id": 1063, "name": "THAIKILA (Ubud)", "category": "шоппинг", "desc": "Стильный бутик премиальных купальников и курортной одежды в центре Убуда. Минималистичный интерьер, голый бетон и огромный выбор эстетичных моделей, которые идеально сидят по фигуре. Это бренд, который создаёт вещи, идеально вписывающиеся в вайб балийского отпуска.", "maps": "https://maps.google.com/maps/search/THAIKILA+Ubud", "district": null}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.20001793254032, -8.400178972727918]}, "properties": {"id": 1064, "name": "Pison Ubud", "category": "кофейни", "desc": "Знаменитая кофейня Pison в Убуде с просторной террасой, окружённой рисовыми полями. Интерьер сочетает тёплое дерево, соломенные крыши и современный комфорт. Идеальное место для неспешного бранча с видом на зелень. <b>🍽 Стоит попробовать:</b> Обязательно закажите их фирменный бейгл со сливочным сыром и лососем (Smoked salmon cream bagel) и освежающий Эспрессо-Матча (Espresso Matcha).", "maps": "https://maps.google.com/maps/search/Pison+Ubud", "district": null}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.1374047419428, -8.412003131009426]}, "properties": {"id": 1065, "name": "Donna (Ubud)", "category": "еда", "desc": "Роскошный ресторан и коктейль-бар для вечернего выхода. Приглушённый свет, изысканная подача блюд (файн-дайнинг) и уникальная коктейльная карта. Идеальный спот, чтобы красиво завершить день в Убуде. <b>📎 Мой совет:</b> приходите сюда вечером и обязательно попробуйте их фирменный Эспрессо Мартини — он здесь один из лучших на острове.", "maps": "https://maps.google.com/maps/search/Donna+Ubud", "district": null}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.19874315483847, -8.427039337265377]}, "properties": {"id": 1066, "name": "Jaens Spa (Ubud)", "category": "спа", "desc": "Потрясающий спа-салон с глубоким вниманием к эстетике расслабления. Просторные массажные кабинеты залиты светом благодаря огромным круглым панорамным окнам-иллюминаторам с видом на сочную зелень джунглей. После 90-минутного традиционного балийского массажа вы можете принять душ прямо в круглой мраморной ванной возле окна. Полная перезагрузка тела и мыслей.", "maps": "https://maps.google.com/maps/search/Jaens+Spa+Ubud", "district": null}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.2259495908911, -8.408176588914554]}, "properties": {"id": 1067, "name": "Pecatu Shooting Club Bali", "category": "экспириенс", "desc": "Премиальный стрелковый клуб на Буките (район Печату). Идеальный способ экологично выпустить пар и получить дозу адреналина после расслабленных дней на вилле. Огромная безопасная территория с множеством тренировочных зон (11-13 bay) и профессиональными инструкторами. Доступна стрельба из настоящего боевого оружия. <b>📎 Мой совет:</b> Если вы никогда не держали в руках оружие — не бойтесь, инструкторы работают даже с новичками.", "maps": "https://maps.google.com/maps/search/Pecatu+Shooting+Club+Bali", "district": null}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.21201201945178, -8.412548004978554]}, "properties": {"id": 1068, "name": "VIP Helicopter Tour (Bali Heli)", "category": "экспириенс", "desc": "Абсолютный апогей «тяжёлого люкса» и романтики на Бали. Полёт на частном вертолёте (Bali Heli / Air Bali) над захватывающими дух отвесными скалами Улувату, гигантской статуей Гаруды-Вишну и бирюзовым океаном. Это тот самый экспириенс, который вы запомните на всю жизнь. Идеальный сценарий для предложения руки и сердца или подарка на день рождения. <b>📎 Мой совет:</b> Бронируйте полёт строго на золотой час перед закатом — виды будут просто кинематографичными.", "maps": "https://maps.google.com/maps/search/Bali+Helicopter+Tour", "district": null}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.20220020237042, -8.410360940015948]}, "properties": {"id": 1069, "name": "Bali Fire Shooting Club (Sanur)", "category": "экспириенс", "desc": "Единственный лицензированный крытый стрелковый клуб на Бали, расположенный в Сануре. Настоящий, брутальный экспириенс с боевым оружием (пистолеты, винтовки). Полностью безопасные условия, профессиональные инструкторы и огромный арсенал на выбор. Идеальное место, чтобы сбросить напряжение, получить мощную дозу адреналина и сделать брутальные кадры. <b>📎 Мой совет:</b> Если вы устали от пляжей и медитаций, это лучший способ перезагрузить нервную систему и выпустить пар.", "maps": "https://maps.google.com/maps/search/Bali+Fire+Shooting+Club", "district": null}}, {"type": "Feature", "geometry": {"type": "Point", "coordinates": [115.20275216111109, -8.40386905599047]}, "properties": {"id": 1070, "name": "VIP Helicopter Flights (Canggu Helipad)", "category": "экспириенс", "desc": "Ультимативный уровень «тихой роскоши» прямо из Чангу. Взлетите на частном вертолёте (Air Bali / Fly Bali) над знаменитыми пляжами с чёрным вулканическим песком, пронеситесь над серферами Эхо Бич и бескрайними рисовыми террасами на закате. Это не просто транспорт — это эксклюзивный опыт, который навсегда останется в памяти. <b>📎 Мой совет:</b> Это самая фотогеничная локация в мире для съёмок роскошного контента. Обязательно берите с собой профессионального фотографа или дроновода для бэкстейджей.", "maps": "https://maps.google.com/maps/search/Canggu+Helicopter+Flights", "district": null}}]};
  var markers = L.markerClusterGroup({
    showCoverageOnHover: false,
    maxClusterRadius: 40,
    iconCreateFunction: function(cluster) {
      return L.divIcon({ html: '<div><span>' + cluster.getChildCount() + '</span></div>', className: 'custom-div-icon', iconSize: L.point(34, 34) });



    }
  });
  var allLayers = [];

  function getEmoji(cat) {
      const m = {'еда':'🍽','кофейни':'☕','природа':'🌿','храмы':'🛕','спорт':'💪','спа':'🧖‍♀️','шоппинг':'🛍','активности':'🏄','пляжи':'🏖','жильё':'🏨'};
      return m[cat] || '📍';
  }

  const urlParams = new URLSearchParams(window.location.search);
const districtParam = urlParams.get('d');

function loadData(filterCat) {
    markers.clearLayers();
    allLayers = [];

    placesData.features.forEach(function(feature) {
      if (districtParam && feature.properties.district !== districtParam) return;
      if (filterCat !== 'all') {
          var c = (feature.properties.category || '').toLowerCase();
          var fc = filterCat.toLowerCase();
          if (fc === 'beach_club') {
              if (c !== 'beach_club' && c !== 'закат' && c !== 'вечеринки' && c !== 'развлечения') return;
          } else if (fc === 'спа') {
              if (c !== 'спа' && c !== 'салон' && c !== 'велнес' && c !== 'йога') return;
          } else if (fc === 'природа') {
              if (c !== 'природа' && c !== 'водопад' && c !== 'пляж') return;
          } else if (fc === 'фото-локации') {
              if (c !== 'фото' && c !== 'галерея' && c !== 'культура') return;
          } else if (fc === 'еда') {
              if (c !== 'еда' && c !== 'кофейни' && c !== 'бары') return;
          } else if (fc === 'жильё') {
              if (c !== 'жильё' && c !== 'глэмпинг') return;
          } else if (fc === 'храмы') {
              if (c !== 'храмы' && c !== 'культура') return;
          } else if (fc === 'шоппинг') {
              if (c !== 'шоппинг' && c !== 'галерея') return;
          } else if (fc === 'продукты') {
              if (c !== 'продукты' && c !== 'рынки') return;
          } else if (fc === 'водопады') {
              if (c !== 'водопад' && c !== 'природа') return;
          } else if (fc === 'вулканы') {
              if (c !== 'вулкан') return;
          } else if (fc === 'активности') {
              if (c !== 'активности' && c !== 'спорт') return;
          } else {
              if (c !== fc && !fc.includes(c) && !c.includes(fc.replace('и',''))) return;
          }
      }

      var latlng = L.latLng(feature.geometry.coordinates[1], feature.geometry.coordinates[0]);
      var cat = feature.properties.category || '';
      var price = feature.properties.price ? (' • ' + feature.properties.price) : '';
      
      var popupHtml = `
        <div class="popup-card">
          <div class="popup-cat">${getEmoji(cat)} ${cat.toUpperCase()}</div>
          <div class="popup-title">${feature.properties.name}</div>
          <div style="font-size:12px; font-weight:700; margin-bottom:8px; display:flex; align-items:center;">
             <span style="background:rgba(42, 107, 90, 0.1); color:#2a6b5a; padding:2px 6px; border-radius:4px;">${feature.properties.budget}${price}</span>
          </div>
          <div class="popup-desc">${feature.properties.desc}</div>
          <a href="${feature.properties.maps}" target="_blank" class="popup-btn">Открыть в Google Maps</a>
        </div>
      `;

      var iconHtml = `<div style="background:#2a6b5a; color:white; font-size:16px; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 5px rgba(0,0,0,0.3); border:2px solid white;">${getEmoji(cat)}</div>`;
      var customIcon = L.divIcon({ html: iconHtml, className: '', iconSize: [30, 30], iconAnchor: [15, 15] });

      var marker = L.marker(latlng, { icon: customIcon }).bindPopup(popupHtml);
      markers.addLayer(marker);
      allLayers.push(marker);
    });
    
        map.addLayer(markers);
    if (markers.getLayers().length > 0) {
        map.fitBounds(markers.getBounds(), {padding: [50, 50]});
    }
  }

  function filterMap(cat, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadData(cat);
  }

  const catParam = urlParams.get('c') || 'all';
    // Select the correct button in UI if possible
    document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.remove('active');
        if (catParam !== 'all' && b.innerText.toLowerCase().includes(catParam.toLowerCase())) {
            b.classList.add('active');
        } else if (catParam === 'all' && b.innerText === 'Все места') {
            b.classList.add('active');
        }
    });
    loadData(catParam);

var userLocationMarker = null;

function locateUser() {
    map.locate({setView: true, maxZoom: 14});
}

map.on('locationfound', function(e) {
    if (userLocationMarker) {
        map.removeLayer(userLocationMarker);
    }
    var userIcon = L.divIcon({
        className: 'user-loc-icon',
        html: '<div style="width: 14px; height: 14px; background: #007AFF; border: 2px solid white; border-radius: 50%; box-shadow: 0 0 0 4px rgba(0, 122, 255, 0.3);"></div>',
        iconSize: [20, 20],
        iconAnchor: [10, 10]
    });
    userLocationMarker = L.marker(e.latlng, {icon: userIcon, zIndexOffset: 1000}).addTo(map);
    userLocationMarker.bindPopup("📍 Вы здесь").openPopup();
});

map.on('locationerror', function(e) {
    alert("Не удалось определить вашу геопозицию. Убедитесь, что вы разрешили доступ к GPS для Telegram.");
});

var locateBtn = L.control({position: 'bottomright'});
locateBtn.onAdd = function (map) {
    var div = L.DomUtil.create('div', 'leaflet-bar leaflet-control');
    div.innerHTML = '<a href="#" onclick="locateUser(); return false;" style="display: flex; gap: 8px; justify-content: center; align-items: center; background: #2a6b5a; color: white; padding: 12px 20px; border-radius: 30px; box-shadow: 0 4px 15px rgba(42,107,90,0.4); text-decoration: none; font-weight: 700; font-size: 14px; font-family: \'Inter\', sans-serif;"><span style="font-size:18px;">🎯</span> Где я?</a>';
    div.style.border = 'none';
    div.style.marginBottom = '20px';
    div.style.marginRight = '10px';
    return div;
};
locateBtn.addTo(map);

</script>
