<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Интерактивная карта Бали</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
<link rel="stylesheet" href="style.css?v=200" />
<style>
  body, html { margin: 0; padding: 0; height: 100%; font-family: Inter, sans-serif; background: #faf9f6; }
  #map { height: 100vh; width: 100%; }
  .map-header { position: absolute; top: 10px; left: 10px; right: 10px; z-index: 1000; background: rgba(255,255,255,0.9); backdrop-filter: blur(10px); padding: 15px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); border: 1px solid rgba(42, 107, 90, 0.1); display: flex; flex-direction: column; gap: 10px; }
  .filters { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn { padding: 8px 16px; background: #fff; border: 1px solid rgba(0,0,0,0.1); border-radius: 20px; font-size: 13px; font-weight: 600; color: #2a2a28; white-space: nowrap; cursor: pointer; transition: 0.2s; }
  .filter-btn.active { background: #2a6b5a; color: white; border-color: #2a6b5a; }
  .leaflet-popup-content-wrapper { border-radius: 12px; padding: 0; overflow: hidden; }
  .leaflet-popup-content { margin: 0; width: 280px !important; }
  .popup-card { padding: 16px; background: white; }
  .popup-title { font-size: 18px; font-weight: 700; color: #2a2a28; font-family: 'Playfair Display', serif; margin-bottom: 4px; }
  .popup-cat { font-size: 12px; font-weight: 600; color: #2a6b5a; text-transform: uppercase; margin-bottom: 8px; }
  .popup-desc { font-size: 13px; color: rgba(0,0,0,0.7); margin-bottom: 12px; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .popup-btn { display: block; width: 100%; padding: 10px; background: #2a6b5a; color: white; text-align: center; text-decoration: none; border-radius: 8px; font-weight: 600; font-size: 14px; }
  .custom-div-icon { background: #2a6b5a; border: 2px solid white; border-radius: 50%; color: white; font-weight: bold; text-align: center; line-height: 30px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
  .back-btn { display: flex; align-items: center; justify-content: center; width: 40px; height: 40px; background: rgba(0,0,0,0.05); border-radius: 50%; cursor: pointer; border: none; }
  .header-top { display: flex; align-items: center; gap: 15px; }
  .header-title { font-size: 18px; font-weight: 700; font-family: 'Playfair Display', serif; }
</style>
</head>
<body>

<div class="map-header">
  <div class="header-top">
    <button class="back-btn" onclick="window.history.back()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#2a6b5a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </button>
    <div class="header-title">Карта <span style="color:#2a6b5a;">мест</span></div>
  </div>
  
    <div style="position:relative; margin-top:12px;">
        <div id="filtersWrapper" style="max-height: 40px; overflow: hidden; transition: max-height 0.3s ease-out; position:relative;">
            <div class="filters" id="catFilters" style="display:flex; flex-wrap:wrap; gap:8px; padding-bottom:8px;">
                <div class="filter-btn active" onclick="filterMap('all', this)">Все места</div>
                <div class="filter-btn" onclick="filterMap('еда', this)">🍜 Рестораны</div>
                <div class="filter-btn" onclick="filterMap('кофейни', this)">☕ Кафе</div>
                <div class="filter-btn" onclick="filterMap('спа', this)">💆 Спа и Массаж</div>
                <div class="filter-btn" onclick="filterMap('beach_club', this)">🌅 Бич-Клабы</div>
                <div class="filter-btn" onclick="filterMap('жильё', this)">🏠 Жильё</div>
                <div class="filter-btn" onclick="filterMap('пляжи', this)">🏖 Пляжи</div>
                <div class="filter-btn" onclick="filterMap('храмы', this)">🛕 Храмы</div>
                <div class="filter-btn" onclick="filterMap('фото-локации', this)">📸 Фото-локации</div>
                <div class="filter-btn" onclick="filterMap('водопады', this)">💧 Водопады</div>
                <div class="filter-btn" onclick="filterMap('шоппинг', this)">🛍 Шоппинг</div>
                <div class="filter-btn" onclick="filterMap('продукты', this)">🛒 Продуктовые</div>
                <div class="filter-btn" onclick="filterMap('природа', this)">🌴 Природа</div>
            </div>
            <div id="filterGradient" style="position:absolute; bottom:0; left:0; right:0; height:20px; background:linear-gradient(to bottom, rgba(255,255,255,0), rgba(255,255,255,1)); pointer-events:none;"></div>
        </div>
        <div id="toggleFiltersBtn" onclick="toggleFilters()" style="text-align:center; font-size:12px; color:#2a6b5a; cursor:pointer; padding:4px 0; font-weight:600;">
            Показать все фильтры ▼
        </div>
    </div>
    <script>
    function toggleFilters() {
        var w = document.getElementById('filtersWrapper');
        var btn = document.getElementById('toggleFiltersBtn');
        var grad = document.getElementById('filterGradient');
        if (w.style.maxHeight === '40px') {
            w.style.maxHeight = '500px';
            btn.innerHTML = 'Скрыть фильтры ▲';
            grad.style.display = 'none';
        } else {
            w.style.maxHeight = '40px';
            btn.innerHTML = 'Показать все фильтры ▼';
            grad.style.display = 'block';
        }
    }
    </script>

</div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
  var map = L.map('map', { zoomControl: false }).setView([-8.5, 115.2], 10);
  
  L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; OpenStreetMap',
    maxZoom: 19
  }).addTo(map);

  var placesData = { /* placeholder */ };
  var markers = L.markerClusterGroup({
    showCoverageOnHover: false,
    maxClusterRadius: 40,
    iconCreateFunction: function(cluster) {
      return L.divIcon({ html: '<div><span>' + cluster.getChildCount() + '</span></div>', className: 'custom-div-icon', iconSize: L.point(34, 34) });
    }
  });
  var allLayers = [];

  function getEmoji(cat) {
      const m = {'еда':'🍽','кофейни':'☕','природа':'🌿','храмы':'🛕','спорт':'💪','спа':'🧖‍♀️','шоппинг':'🛍','активности':'🏄','пляжи':'🏖','жильё':'🏨'};
      return m[cat] || '📍';
  }

  const urlParams = new URLSearchParams(window.location.search);
const districtParam = urlParams.get('d');

function loadData(filterCat) {
    markers.clearLayers();
    allLayers = [];

    placesData.features.forEach(function(feature) {
      if (districtParam && feature.properties.district !== districtParam) return;
      if (filterCat !== 'all' && feature.properties.category !== filterCat) return;

      var latlng = L.latLng(feature.geometry.coordinates[1], feature.geometry.coordinates[0]);
      var cat = feature.properties.category || '';
      var price = feature.properties.price ? (' • ' + feature.properties.price) : '';
      
      var popupHtml = `
        <div class="popup-card">
          <div class="popup-cat">${getEmoji(cat)} ${cat.toUpperCase()}</div>
          <div class="popup-title">${feature.properties.name}</div>
          <div style="font-size:12px; font-weight:700; margin-bottom:8px; display:flex; align-items:center;">
             <span style="background:rgba(42, 107, 90, 0.1); color:#2a6b5a; padding:2px 6px; border-radius:4px;">${feature.properties.budget}${price}</span>
          </div>
          <div class="popup-desc">${feature.properties.desc}</div>
          <a href="${feature.properties.maps}" target="_blank" class="popup-btn">Открыть в Google Maps</a>
        </div>
      `;

      var iconHtml = `<div style="background:#2a6b5a; color:white; font-size:16px; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 5px rgba(0,0,0,0.3); border:2px solid white;">${getEmoji(cat)}</div>`;
      var customIcon = L.divIcon({ html: iconHtml, className: '', iconSize: [30, 30], iconAnchor: [15, 15] });

      var marker = L.marker(latlng, { icon: customIcon }).bindPopup(popupHtml);
      markers.addLayer(marker);
      allLayers.push(marker);
    });
    
        map.addLayer(markers);
    if (markers.getLayers().length > 0) {
        map.fitBounds(markers.getBounds(), {padding: [50, 50]});
    }
  }

  function filterMap(cat, btn) {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    loadData(cat);
  }

  const catParam = urlParams.get('c') || 'all';
    // Select the correct button in UI if possible
    document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.remove('active');
        if (catParam !== 'all' && b.innerText.toLowerCase().includes(catParam.toLowerCase())) {
            b.classList.add('active');
        } else if (catParam === 'all' && b.innerText === 'Все места') {
            b.classList.add('active');
        }
    });
    loadData(catParam);
</script>
</body>
</html>
