*{margin:0;padding:0;box-sizing:border-box}
body{background:#f8f6f2;color:#2a2a28;font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
.grad1{position:fixed;top:-20%;right:-15%;width:55%;height:55%;background:radial-gradient(ellipse,rgba(100,180,160,0.25) 0%,transparent 70%);filter:blur(60px);pointer-events:none;z-index:0;animation:d1 16s ease-in-out infinite}
.grad2{position:fixed;bottom:-15%;left:-10%;width:50%;height:50%;background:radial-gradient(ellipse,rgba(180,160,120,0.2) 0%,transparent 70%);filter:blur(55px);pointer-events:none;z-index:0;animation:d2 14s ease-in-out infinite}
.grad3{position:fixed;top:40%;left:15%;width:35%;height:35%;background:radial-gradient(ellipse,rgba(120,170,200,0.15) 0%,transparent 60%);filter:blur(45px);pointer-events:none;z-index:0;animation:d3 18s ease-in-out infinite}
@keyframes d1{0%,100%{transform:translate(0,0)}50%{transform:translate(-15px,20px)}}
@keyframes d2{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-15px)}}
@keyframes d3{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(10px,-10px) scale(1.05)}}
.app{max-width:480px;margin:0 auto;padding:24px 20px;min-height:100vh;display:flex;flex-direction:column;position:relative;z-index:1}
.screen{display:none;flex:1;flex-direction:column;animation:fadeIn 0.5s ease}
.screen.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}









.bali-map{width:100%;max-width:360px;height:auto}
.bali-map text{cursor:pointer;transition:fill 0.2s}
.bali-map text:hover{fill:rgba(42,107,90,0.8) !important}
.bali-map .dot{cursor:pointer}
.title{font-size:28px;font-weight:700;text-align:center;line-height:1.25;margin-bottom:12px;color:#2a2a28}
.title em{font-family:'Playfair Display',serif;font-style:italic;font-weight:400;color:#2a6b5a;font-size:1.15em}
.subtitle{font-size:14px;color:rgba(42,42,40,0.45);text-align:center;line-height:1.6;margin-bottom:32px;padding:0 10px}
.steps{display:flex;justify-content:center;gap:8px;margin-bottom:28px}
.step-dot{width:8px;height:8px;border-radius:50%;background:rgba(0,0,0,0.08);transition:all 0.3s}
.step-dot.active{background:#2a6b5a;width:24px;border-radius:4px}
.step-dot.done{background:rgba(42,107,90,0.3)}
.section-title{font-size:13px;font-weight:600;color:rgba(42,107,90,0.7);letter-spacing:2px;text-transform:uppercase;margin-bottom:16px}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:24px}
.chip{padding:10px 18px;border-radius:50px;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.3s;border:1.5px solid rgba(0,0,0,0.06);background:rgba(255,255,255,0.6);color:rgba(42,42,40,0.7);backdrop-filter:blur(8px);user-select:none}
.chip:hover{background:rgba(255,255,255,0.85);border-color:rgba(42,107,90,0.15)}
.chip.selected{background:rgba(42,107,90,0.1);border-color:rgba(42,107,90,0.3);color:#2a6b5a}
.btn{display:flex;width:100%;padding:16px 24px;border:none;border-radius:50px;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.3s;text-decoration:none;font-family:'Inter',sans-serif;align-items:center;justify-content:center;gap:10px}
.btn-primary{background:rgba(255,255,255,0.7);color:#2a2a28;border:1px solid rgba(0,0,0,0.06);backdrop-filter:blur(12px);box-shadow:0 2px 16px rgba(0,0,0,0.04);margin-top:auto}
.btn-primary:hover{background:rgba(255,255,255,0.9)}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed}
.btn svg{width:16px;height:16px;transition:transform 0.3s}
.btn:hover svg{transform:translate(2px,-2px)}
.result-card{background:rgba(255,255,255,0.5);border:1px solid rgba(0,0,0,0.04);border-radius:20px;padding:24px 20px;margin-bottom:12px;backdrop-filter:blur(16px)}
.result-num{font-family:'Playfair Display',serif;font-size:36px;font-weight:700;color:#2a6b5a;margin-bottom:4px}
.result-name{font-size:20px;font-weight:700;margin-bottom:6px}
.result-match{font-size:13px;color:rgba(42,107,90,0.6);margin-bottom:12px;font-weight:500}
.result-bar{height:4px;background:rgba(0,0,0,0.04);border-radius:2px;margin-bottom:12px;overflow:hidden}
.result-bar-fill{height:100%;background:linear-gradient(90deg,#2a6b5a,#4a9b8a);border-radius:2px;transition:width 1.2s ease}
.result-who{font-size:13px;color:rgba(42,42,40,0.5);margin-bottom:8px;font-weight:500}
.result-desc{font-size:13px;color:rgba(42,42,40,0.55);line-height:1.6}
.result-places{margin-top:12px}
.result-place{font-size:13px;color:rgba(42,42,40,0.7);padding:6px 0;border-bottom:1px solid rgba(0,0,0,0.03)}
.result-place:last-child{border:none}
.share-text{font-size:12px;color:rgba(42,42,40,0.3);text-align:center;margin-top:16px;margin-bottom:12px}
/* Map popup */
.map-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.15);backdrop-filter:blur(3px);z-index:99}
.map-overlay.show{display:block}
.map-popup{display:none;position:fixed;bottom:0;left:0;right:0;z-index:100}
.map-popup.show{display:block;animation:slideUp 0.3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.map-popup-card{max-width:480px;margin:0 auto;background:#f8f6f2;border-radius:20px 20px 0 0;padding:24px 20px 32px;box-shadow:0 -4px 32px rgba(0,0,0,0.08)}
.map-popup-handle{width:36px;height:4px;background:rgba(0,0,0,0.1);border-radius:2px;margin:0 auto 16px}
.map-popup-name{font-family:'Playfair Display',serif;font-style:italic;font-size:24px;color:#2a6b5a;margin-bottom:8px}
.map-popup-who{font-size:12px;color:rgba(42,42,40,0.45);margin-bottom:10px}
.map-popup-desc{font-size:14px;color:rgba(42,42,40,0.65);line-height:1.6;margin-bottom:16px}
.map-popup-tags{display:flex;flex-wrap:wrap;gap:6px}
.map-popup-tag{font-size:11px;padding:5px 12px;border-radius:50px;background:rgba(42,107,90,0.06);color:#2a6b5a;border:1px solid rgba(42,107,90,0.1)}
.footer{text-align:center;padding:20px 0;font-size:10px;color:rgba(42,42,40,0.2);letter-spacing:1px;text-transform:uppercase}
</style>

function renderChips(items,cId,arr,bId){var c=document.getElementById(cId);c.innerHTML='';items.forEach(function(item){var d=document.createElement('div');d.className='chip';d.innerHTML='<span>'+item.emoji+'</span> '+item.label;d.onclick=function(){var i=arr.indexOf(item.id);if(i>=0){arr.splice(i,1);d.classList.remove('selected')}else{arr.push(item.id);d.classList.add('selected')}document.getElementById(bId).disabled=arr.length===0};c.appendChild(d)})}
