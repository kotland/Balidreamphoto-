<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Где свои на Бали</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="style.css?v=1774488851">
<style>
    @keyframes blobShape {
        0% { border-radius: 50%; }
        33% { border-radius: 48% 52% 50% 50% / 50% 49% 51% 50%; }
        66% { border-radius: 51% 49% 49% 51% / 49% 51% 48% 52%; }
        100% { border-radius: 50%; }
    }
    @keyframes blobBlink {
        0%, 95%, 98% { transform: scaleY(1); }
        96% { transform: scaleY(0.1); }
    }
    @keyframes blobSmile {
        0%, 100% { border-bottom-width: 4px; transform: translateY(0); }
        50% { border-bottom-width: 5px; transform: translateY(-1px); }
    }
    @keyframes blobJump {
        0%, 100% { transform: translateY(0) scale(1, 1); }
        40% { transform: translateY(-25px) scale(0.95, 1.05); }
        50% { transform: translateY(-30px) scale(0.9, 1.1); }
        60% { transform: translateY(-25px) scale(0.95, 1.05); }
        90% { transform: translateY(2px) scale(1.05, 0.95); }
    }
    @keyframes shadowScale {
        0%, 100% { transform: scale(1); opacity: 0.6; }
        50% { transform: scale(0.6); opacity: 0.2; }
    }
    .blob-scene {
        position: relative;
        width: 200px;
        height: 200px;
        margin: 40px auto 20px auto;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
    }
    .blob-map {
        position: absolute;
        bottom: 10px;
        width: 140px;
        height: 40px;
        background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
        border-radius: 50%;
        box-shadow: inset 0 -4px 10px rgba(0,0,0,0.05), 0 10px 20px rgba(168, 237, 234, 0.4);
        z-index: 1;
    }
    .blob-shadow {
        position: absolute;
        bottom: 25px;
        width: 80px;
        height: 15px;
        background: rgba(0,0,0,0.15);
        border-radius: 50%;
        filter: blur(2px);
        animation: shadowScale 1.5s ease-in-out infinite;
        z-index: 2;
    }
    .blob-character {
        position: absolute;
        bottom: 20px;
        width: 110px;
        height: 110px;
        background-color: #ffd1b8;
        background: -webkit-radial-gradient(30% 30%, circle, #ffd1b8 0%, #ffb8c5 40%, #c1d8f5 80%, #f4f8ff 100%);
        background: radial-gradient(circle at 30% 30%, #ffd1b8 0%, #ffb8c5 40%, #c1d8f5 80%, #f4f8ff 100%);
        animation: blobShape 4s ease-in-out infinite, blobJump 1.5s cubic-bezier(0.28, 0.84, 0.42, 1) infinite;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 15px 35px rgba(180, 200, 255, 0.4), inset -10px -10px 20px rgba(255, 255, 255, 0.8), inset 8px 8px 15px rgba(255, 210, 200, 0.6);
        z-index: 3;
        transform-origin: bottom center;
    }
    .blob-face {
        position: absolute;
        top: 50%;
        left: 53%;
        transform: translate(-50%, -50%);
        width: 55px;
        height: 25px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
    }
    .blob-eyes {
        width: 100%;
        display: flex;
        justify-content: space-between;
        padding: 0 4px;
        box-sizing: border-box;
    }
    .blob-eye {
        width: 10px;
        height: 14px;
        background: #1a1a1a;
        border-radius: 50%;
        animation: blobBlink 5s infinite;
        transform-origin: center;
    }
    .blob-mouth {
        width: 14px;
        height: 8px;
        border-bottom: 4px solid #1a1a1a;
        border-radius: 0 0 14px 14px;
        margin-top: 4px;
        animation: blobSmile 3s ease-in-out infinite;
    }
</style>
</head>
<body>
<div class="grad1"></div><div class="grad2"></div><div class="grad3"></div>
<div class="app">
<!-- AUTHENTICATION OVERLAY -->
<div id="authOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(248,246,242,0.9);backdrop-filter:blur(5px);z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;display:none;">
    <div id="authLoader" style="text-align:center;padding:20px;">
        <div style="font-size:48px;margin-bottom:20px;animation:spin 2s linear infinite;">⏳</div>
        <h1 style="font-family:'Playfair Display',serif;font-size:24px;margin-bottom:8px;color:#2a6b5a;">Проверка доступа...</h1>
        <p style="color:rgba(42,42,40,0.5);">Соединение с Telegram</p>
    </div>
    <div id="authDenied" style="text-align:center;padding:20px;display:none;">
        <div style="font-size:48px;margin-bottom:20px;">⛔️</div>
        <h1 style="font-family:'Playfair Display',serif;font-size:28px;margin-bottom:8px;color:#e74c3c;">Доступ закрыт</h1>
        <p style="color:rgba(42,42,40,0.7);margin-bottom:20px;line-height:1.5;">Для входа в гайд необходимо<br>оплатить тариф.</p>
        <div style="display:flex;flex-direction:column;gap:12px;width:100%;max-width:280px;margin:0 auto;">
            <button onclick="window.Telegram.WebApp.openTelegramLink('https://t.me/balidreamphoto_bot?start=tariffs')" style="padding:14px 20px;border-radius:14px;font-size:16px;background:linear-gradient(135deg,#2a6b5a,#3a9b7a);color:white;border:none;cursor:pointer;font-family:Inter,sans-serif;font-weight:600;box-shadow:0 4px 15px rgba(42,107,90,0.3);">💳 Оплатить тариф</button>
            <button onclick="document.getElementById('authOverlay').style.display='none'" style="padding:14px 20px;border-radius:14px;font-size:16px;background:rgba(42,42,40,0.1);color:#2a2a28;border:none;cursor:pointer;font-family:Inter,sans-serif;font-weight:600;">Отмена</button>
        </div>
    </div>
    <style>@keyframes spin { 100% { transform:rotate(360deg); } }</style>
</div>

<!-- LANGUAGE SELECTION -->
<div id="langOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:#f8f6f2;z-index:99998;display:flex;align-items:center;justify-content:center;display:none">
<div style="text-align:center;padding:20px">
<div style="font-size:48px;margin-bottom:20px">🌍</div>
<h2 style="font-family:'Playfair Display',serif;font-size:24px;margin-bottom:24px">Choose language</h2>
<div style="display:flex;flex-direction:column;gap:12px;max-width:280px;margin:0 auto">
<button onclick="setLang('ru')" style="padding:16px 24px;border-radius:14px;border:2px solid rgba(42,107,90,0.2);background:white;font-size:16px;cursor:pointer;font-family:Inter,sans-serif">🇷🇺 Русский</button>
<button onclick="setLang('en')" style="padding:16px 24px;border-radius:14px;border:2px solid rgba(42,107,90,0.2);background:white;font-size:16px;cursor:pointer;font-family:Inter,sans-serif">🇬🇧 English</button>
<button onclick="setLang('ua')" style="padding:16px 24px;border-radius:14px;border:2px solid rgba(42,107,90,0.2);background:white;font-size:16px;cursor:pointer;font-family:Inter,sans-serif">🇺🇦 Українська</button>
<button onclick="setLang('kz')" style="padding:16px 24px;border-radius:14px;border:2px solid rgba(42,107,90,0.2);background:white;font-size:16px;cursor:pointer;font-family:Inter,sans-serif">🇰🇿 Қазақша</button>
<button onclick="setLang('ar')" style="padding:16px 24px;border-radius:14px;border:2px solid rgba(42,107,90,0.2);background:white;font-size:16px;cursor:pointer;font-family:Inter,sans-serif">🇦🇪 العربية</button>
</div>
</div>
</div>

<!-- CHOICE SCREEN -->

<div class="screen active" id="choiceScreen">

<div class="title">Твой <em>гид</em> по Бали</div>
<div class="subtitle" style="margin-bottom:32px" id="choiceSubtitle">Выбери, что нужно именно тебе</div>
<button class="btn btn-primary" onclick="startLiving()" style="margin-bottom:12px;padding:20px 24px">
<div style="text-align:left;width:100%">
<div style="font-size:16px;font-weight:700">Где жить на Бали</div>
<div style="font-size:12px;color:rgba(42,42,40,0.5);margin-top:4px">Отпуск · 90+ маршрутов</div>
</div>
<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
</button>

<button class="btn btn-primary" onclick="openCatalog()" style="padding:20px 24px;margin-bottom:12px">
<div style="text-align:left;width:100%">
<div style="font-size:16px;font-weight:700">📍 Каталог мест</div>
<div style="font-size:12px;color:rgba(42,42,40,0.5);margin-top:4px">200+ мест по районам и категориям</div>
</div>
<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
</button>
<button class="btn btn-primary" onclick="openBase()" style="padding:20px 24px;background:rgba(42,107,90,0.06);border:1px solid rgba(42,107,90,0.1)">
<div style="text-align:left;width:100%">
<div style="font-size:16px;font-weight:700;color:#2a6b5a">📋 Бали База</div>
<div style="font-size:12px;color:rgba(42,42,40,0.5);margin-top:4px">Опасности · Байк · Аптечка · Деньги · Культура</div>
</div>
<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#2a6b5a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
</button>

<div style="text-align:center;margin-top:24px">
<button onclick="localStorage.removeItem('bali_lang');showLangOverlay()" style="padding:8px 16px;border-radius:10px;border:1px solid rgba(42,107,90,0.15);background:rgba(42,107,90,0.04);font-size:13px;cursor:pointer;font-family:Inter,sans-serif;color:rgba(42,42,40,0.5)">🌍 Сменить язык</button>
</div>
</div>
<!-- START SCREEN (District filter intro) -->
</div>
<script>
function startLiving(){ checkRouteAccess('guides.html?v=' + Date.now()); }
function openBase(){ window.location.href = 'base.html?v=' + Date.now(); }
function openCatalog(){ checkRouteAccess('catalog.html?v=' + Date.now()); }

function setLang(lang) {
  localStorage.setItem('bali_lang', lang);
  document.getElementById('langOverlay').style.display = 'none';
  if (lang === 'en') { window.location.href = 'en/index.html?v=' + Date.now(); return; }
  if (lang === 'ua') { window.location.href = 'ua/index.html?v=' + Date.now(); return; }
  if (lang === 'kz') { window.location.href = 'kz/index.html?v=' + Date.now(); return; }
  if (lang === 'ar') { window.location.href = 'ar/index.html?v=' + Date.now(); return; }
  // ru — stay on current page
}

function showLangOverlay() {
  if (localStorage.getItem('bali_lang')) {
    var lang = localStorage.getItem('bali_lang');
    if (lang === 'en') { window.location.href = 'en/index.html?v=' + Date.now(); return; }
    if (lang === 'ua') { window.location.href = 'ua/index.html?v=' + Date.now(); return; }
    if (lang === 'kz') { window.location.href = 'kz/index.html?v=' + Date.now(); return; }
    if (lang === 'ar') { window.location.href = 'ar/index.html?v=' + Date.now(); return; }
    return; // ru — stay
  }
  document.getElementById('langOverlay').style.display = 'flex';
}

const SUPABASE_URL = "https://hukabkvchfaueonkiocw.supabase.co/rest/v1";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1a2Fia3ZjaGZhdWVvbmtpb2N3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1OTQ0MDksImV4cCI6MjA5MDE3MDQwOX0.PR14C60SvJ_7xvjgG5Uyq-B2aarlmIrzRXV9RzYjF8c";

let hasVerifiedAccess = false;

async function checkRouteAccess(targetUrl) {
    if (hasVerifiedAccess) {
        window.location.href = targetUrl;
        return;
    }

    document.getElementById('authOverlay').style.display = 'flex';
    document.getElementById('authLoader').style.display = 'block';
    document.getElementById('authDenied').style.display = 'none';

    if (!window.Telegram || !window.Telegram.WebApp || !window.Telegram.WebApp.initDataUnsafe || !window.Telegram.WebApp.initDataUnsafe.user) {
        document.getElementById('authLoader').style.display = 'none';
        document.getElementById('authDenied').innerHTML = '<div style="font-size:48px;margin-bottom:20px;">📱</div><h1 style="font-family:\'Playfair Display\',serif;font-size:24px;margin-bottom:8px;color:#e74c3c;">Откройте в Telegram</h1><p style="color:rgba(42,42,40,0.7);margin-bottom:20px;">Платные разделы доступны только внутри бота.</p><div style="text-align:center;"><button onclick="document.getElementById(\'authOverlay\').style.display=\'none\'" style="padding:14px 40px;border-radius:14px;font-size:16px;background:rgba(42,42,40,0.1);color:#2a2a28;border:none;font-weight:600;">Закрыть</button></div>';
        document.getElementById('authDenied').style.display = 'block';
        return;
    }

    const user = window.Telegram.WebApp.initDataUnsafe.user;
    const userId = user.id;
    const username = user.username ? user.username.toLowerCase() : '';

    try {
        let query = `?select=has_access&or=(id.eq.${userId},username.eq.${username})&has_access=eq.true`;
        let response = await fetch(`${SUPABASE_URL}/users${query}`, {
            headers: {
                'apikey': SUPABASE_ANON,
                'Authorization': `Bearer ${SUPABASE_ANON}`
            }
        });
        let data = await response.json();
        
        if (data && data.length > 0 && data[0].has_access) {
            hasVerifiedAccess = true;
            document.getElementById('authOverlay').style.display = 'none';
            window.location.href = targetUrl;
        } else {
            document.getElementById('authLoader').style.display = 'none';
            document.getElementById('authDenied').style.display = 'block';
        }
    } catch(e) {
        document.getElementById('authLoader').style.display = 'none';
        document.getElementById('authDenied').innerHTML = '<p>Ошибка соединения с БД</p><button onclick="document.getElementById(\'authOverlay\').style.display=\'none\'" style="margin-top:10px;padding:10px 20px;background:rgba(0,0,0,0.1);border-radius:10px;border:none;">Закрыть</button>';
        document.getElementById('authDenied').style.display = 'block';
    }
}

var CHOICE_PHRASES=['Выбери, что нужно именно тебе','С чего начнём?','Что ищешь на Бали?'];
var cSub=document.getElementById('choiceSubtitle');
if(cSub){cSub.textContent=CHOICE_PHRASES[Math.floor(Math.random()*CHOICE_PHRASES.length)];}

if(window.Telegram && Telegram.WebApp){
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

// Show lang overlay immediately on load
if (!localStorage.getItem('bali_lang')) {
    document.getElementById('langOverlay').style.display = 'flex';
} else {
    var lg = localStorage.getItem('bali_lang');
    if (lg === 'en') { window.location.href = 'en/index.html?v=' + Date.now(); }
    if (lg === 'ua') { window.location.href = 'ua/index.html?v=' + Date.now(); }
    if (lg === 'kz') { window.location.href = 'kz/index.html?v=' + Date.now(); }
    if (lg === 'ar') { window.location.href = 'ar/index.html?v=' + Date.now(); }
}
</script>
</body>
</html>
