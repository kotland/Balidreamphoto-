<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Где свои на Бали</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="stylesheet" href="style.css?v=200">
<style>
@keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
</style>
</head>
<body>
<div class="grad1"></div><div class="grad2"></div><div class="grad3"></div>
<div class="app">

<!-- AUTHENTICATION OVERLAY -->
<div id="authOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:transparent;backdrop-filter:none;z-index:99999;display:none;align-items:center;justify-content:center;flex-direction:column;">
    <div id="authLoader" style="display:none;"></div>
    <div id="authDenied" style="text-align:center;padding:20px;display:none;background:rgba(248,246,242,0.95);border-radius:24px;box-shadow:0 10px 40px rgba(0,0,0,0.1);max-width:320px;margin:0 auto;">
        <div style="font-size:48px;margin-bottom:20px;">⛔️</div>
        <h1 style="font-family:'Playfair Display',serif;font-size:28px;margin-bottom:8px;color:#e74c3c;">Доступ закрыт</h1>
        <p style="color:rgba(42,42,40,0.7);margin-bottom:20px;line-height:1.5;">Для входа в гайд необходимо<br>оплатить тариф.</p>
        <div style="display:flex;flex-direction:column;gap:12px;width:100%;max-width:280px;margin:0 auto;">
            <button onclick="window.Telegram.WebApp.openTelegramLink('https://t.me/balidreamphoto_bot?start=tariffs')" style="padding:14px 20px;border-radius:14px;font-size:16px;background:linear-gradient(135deg,#2a6b5a,#3a9b7a);color:white;border:none;cursor:pointer;font-family:Inter,sans-serif;font-weight:600;box-shadow:0 4px 15px rgba(42,107,90,0.3);">💳 Оплатить тариф</button>
            <button onclick="document.getElementById('authOverlay').style.display='none'" style="padding:14px 20px;border-radius:14px;font-size:16px;background:rgba(42,42,40,0.1);color:#2a2a28;border:none;cursor:pointer;font-family:Inter,sans-serif;font-weight:600;">Отмена</button>
        </div>
    </div>
</div>

<!-- LANGUAGE SELECTION -->
<div id="langOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:#f8f6f2;z-index:99998;display:none;align-items:center;justify-content:center;">
    <div style="text-align:center;padding:20px">
        <div style="font-size:48px;margin-bottom:20px">🌍</div>
        <h2 style="font-family:'Playfair Display',serif;font-size:24px;margin-bottom:24px">Choose language</h2>
        <div style="display:flex;flex-direction:column;gap:12px;max-width:280px;margin:0 auto">
            <button onclick="setLang('ru')" style="padding:16px 24px;border-radius:14px;border:2px solid rgba(42,107,90,0.2);background:white;font-size:16px;cursor:pointer;font-family:Inter,sans-serif">🇷🇺 Русский</button>
            <button onclick="setLang('en')" style="padding:16px 24px;border-radius:14px;border:2px solid rgba(42,107,90,0.2);background:white;font-size:16px;cursor:pointer;font-family:Inter,sans-serif">🇬🇧 English</button>
            <button onclick="setLang('ua')" style="padding:16px 24px;border-radius:14px;border:2px solid rgba(42,107,90,0.2);background:white;font-size:16px;cursor:pointer;font-family:Inter,sans-serif">🇺🇦 Українська</button>
            <button onclick="setLang('kz')" style="padding:16px 24px;border-radius:14px;border:2px solid rgba(42,107,90,0.2);background:white;font-size:16px;cursor:pointer;font-family:Inter,sans-serif">🇰🇿 Қазақша</button>
            <button onclick="setLang('ar')" style="padding:16px 24px;border-radius:14px;border:2px solid rgba(42,107,90,0.2);background:white;font-size:16px;cursor:pointer;font-family:Inter,sans-serif">🇦🇪 العربية</button>
        </div>
    </div>
</div>

<!-- CHOICE SCREEN -->
<div class="screen active" id="choiceScreen">
    <div style="text-align:center;">
        <div style="font-size:64px; text-align:center; margin-bottom:16px; animation:pulse 2s infinite ease-in-out;">🌴</div>
    </div>
    <div class="title">Твой <em>гид</em> по Бали</div>
    <div class="subtitle" style="margin-bottom:32px" id="choiceSubtitle">Выбери, что нужно именно тебе</div>
    
    <button class="btn btn-primary" onclick="startLiving()" style="margin-bottom:12px;padding:20px 24px">
        <div style="text-align:left;width:100%">
            <div style="font-size:16px;font-weight:700">Гайды и Маршруты по районам</div>
            <div style="font-size:12px;color:rgba(42,42,40,0.5);margin-top:4px">Убуд, Чангу, Улувату и ещё 10 районов</div>
        </div>
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
    </button>

    <button class="btn btn-primary" onclick="openCatalog()" style="padding:20px 24px;margin-bottom:12px">
        <div style="text-align:left;width:100%">
            <div style="font-size:16px;font-weight:700">📍 Каталог мест</div>
            <div style="font-size:12px;color:rgba(42,42,40,0.5);margin-top:4px">200+ мест по районам и категориям</div>
        </div>
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>
    </button>
    
    <div style="display:flex;flex-direction:column;gap:12px;">
    <button class="btn btn-primary" onclick="window.location.href='base.html?v=150'" style="flex:1;padding:16px 20px;background:rgba(42,107,90,0.06);border:1px solid rgba(42,107,90,0.1)">
        <div style="text-align:left;width:100%">
            <div style="font-size:15px;font-weight:700;color:#2a6b5a">📋 Бали База</div>
            <div style="font-size:11px;color:rgba(42,42,40,0.5);margin-top:2px">Байк · Медицина · Выживание</div>
        </div>
    </button>
    <button class="btn btn-primary" onclick="window.location.href='culture.html?v=150'" style="flex:1;padding:16px 20px;background:rgba(179,138,0,0.06);border:1px solid rgba(179,138,0,0.1)">
        <div style="text-align:left;width:100%">
            <div style="font-size:15px;font-weight:700;color:#b38a00">🛕 Культура</div>
            <div style="font-size:11px;color:rgba(42,42,40,0.5);margin-top:2px">Ого-Ого · Менталитет · Касты</div>
        </div>
    </button>
    </div>

    <div style="text-align:center;margin-top:24px">
        <button onclick="localStorage.removeItem('bali_lang');showLangOverlay()" style="padding:8px 16px;border-radius:10px;border:1px solid rgba(42,107,90,0.15);background:rgba(42,107,90,0.04);font-size:13px;cursor:pointer;font-family:Inter,sans-serif;color:rgba(42,42,40,0.5)">🌍 Сменить язык</button>
    </div>
<div style="margin-top:24px;text-align:center;">
    <button onclick="window.Telegram.WebApp.openTelegramLink('https://t.me/daria_is_here')" style="padding:12px 20px;border-radius:12px;background:none;color:rgba(42,42,40,0.5);border:1px solid rgba(42,42,40,0.1);font-size:13px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;">💬 Техподдержка (Связаться)</button>
</div>
</div>

</div>

<script>
function startLiving(){ checkRouteAccess('guides.html?v=' + Date.now()); }
function openBase(){ window.location.href = 'base.html?v=' + Date.now(); }
function openCatalog(){ checkRouteAccess('catalog.html?v=' + Date.now()); }

function setLang(lang) {
  localStorage.setItem('bali_lang', lang);
  document.getElementById('langOverlay').style.display = 'none';
  if (lang === 'en') { window.location.href = 'en/index.html?v=' + Date.now(); return; }
  if (lang === 'ua') { window.location.href = 'ua/index.html?v=' + Date.now(); return; }
  if (lang === 'kz') { window.location.href = 'kz/index.html?v=' + Date.now(); return; }
  if (lang === 'ar') { window.location.href = 'ar/index.html?v=' + Date.now(); return; }
}

function showLangOverlay() {
  if (localStorage.getItem('bali_lang')) {
    var lang = localStorage.getItem('bali_lang');
    if (lang === 'en') { window.location.href = 'en/index.html?v=' + Date.now(); return; }
    if (lang === 'ua') { window.location.href = 'ua/index.html?v=' + Date.now(); return; }
    if (lang === 'kz') { window.location.href = 'kz/index.html?v=' + Date.now(); return; }
    if (lang === 'ar') { window.location.href = 'ar/index.html?v=' + Date.now(); return; }
    return;
  }
  document.getElementById('langOverlay').style.display = 'flex';
}

const SUPABASE_URL = "https://hukabkvchfaueonkiocw.supabase.co/rest/v1";
const SUPABASE_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imh1a2Fia3ZjaGZhdWVvbmtpb2N3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1OTQ0MDksImV4cCI6MjA5MDE3MDQwOX0.PR14C60SvJ_7xvjgG5Uyq-B2aarlmIrzRXV9RzYjF8c";

let hasVerifiedAccess = false;

async function checkRouteAccess(targetUrl) {
    if (hasVerifiedAccess) {
        window.location.href = targetUrl;
        return;
    }

    const authOverlay = document.getElementById('authOverlay');
    const authDenied = document.getElementById('authDenied');
    
    // Make overlay active but completely transparent
    authOverlay.style.background = 'transparent';
    authOverlay.style.backdropFilter = 'none';
    authOverlay.style.display = 'flex';
    authDenied.style.display = 'none';

    if (!window.Telegram || !window.Telegram.WebApp || !window.Telegram.WebApp.initDataUnsafe || !window.Telegram.WebApp.initDataUnsafe.user) {
        authOverlay.style.background = 'rgba(248,246,242,0.9)';
        authOverlay.style.backdropFilter = 'blur(5px)';
        authDenied.innerHTML = '<div style="font-size:48px;margin-bottom:20px;">📱</div><h1 style="font-family:\'Playfair Display\',serif;font-size:24px;margin-bottom:8px;color:#e74c3c;">Откройте в Telegram</h1><p style="color:rgba(42,42,40,0.7);margin-bottom:20px;">Платные разделы доступны только внутри бота.</p><div style="text-align:center;"><button onclick="document.getElementById(\'authOverlay\').style.display=\'none\'" style="padding:14px 40px;border-radius:14px;font-size:16px;background:rgba(42,42,40,0.1);color:#2a2a28;border:none;font-weight:600;">Закрыть</button></div>';
        authDenied.style.display = 'block';
        return;
    }

    const user = window.Telegram.WebApp.initDataUnsafe.user;
    const userId = user.id;
    const username = user.username ? user.username.toLowerCase() : '';

    try {
        let query = `?select=has_access&or=(id.eq.${userId},username.eq.${username})&has_access=eq.true`;
        let response = await fetch(`${SUPABASE_URL}/users${query}`, {
            headers: {
                'apikey': SUPABASE_ANON,
                'Authorization': `Bearer ${SUPABASE_ANON}`
            }
        });
        let data = await response.json();
        
        if (data && data.length > 0 && data[0].has_access) {
            hasVerifiedAccess = true;
            authOverlay.style.display = 'none';
            window.location.href = targetUrl;
        } else {
            authOverlay.style.background = 'rgba(248,246,242,0.9)';
            authOverlay.style.backdropFilter = 'blur(5px)';
            authDenied.style.display = 'block';
        }
    } catch(e) {
        authOverlay.style.background = 'rgba(248,246,242,0.9)';
        authOverlay.style.backdropFilter = 'blur(5px)';
        authDenied.innerHTML = '<p>Ошибка соединения с БД</p><button onclick="document.getElementById(\'authOverlay\').style.display=\'none\'" style="margin-top:10px;padding:10px 20px;background:rgba(0,0,0,0.1);border-radius:10px;border:none;">Закрыть</button>';
        authDenied.style.display = 'block';
    }
}

var CHOICE_PHRASES=['Выбери, что нужно именно тебе','С чего начнём?','Что ищешь на Бали?'];
var cSub=document.getElementById('choiceSubtitle');
if(cSub){cSub.textContent=CHOICE_PHRASES[Math.floor(Math.random()*CHOICE_PHRASES.length)];}

if(window.Telegram && Telegram.WebApp){
  Telegram.WebApp.ready();
  Telegram.WebApp.expand();
}

if (!localStorage.getItem('bali_lang')) {
    document.getElementById('langOverlay').style.display = 'flex';
} else {
    var lg = localStorage.getItem('bali_lang');
    if (lg === 'en') { window.location.href = 'en/index.html?v=' + Date.now(); }
    if (lg === 'ua') { window.location.href = 'ua/index.html?v=' + Date.now(); }
    if (lg === 'kz') { window.location.href = 'kz/index.html?v=' + Date.now(); }
    if (lg === 'ar') { window.location.href = 'ar/index.html?v=' + Date.now(); }
}
</script>
</body>
</html>
