/* ========== QUIZ LOGIC ========== */
var selWho=[],selWhat=[];
function renderChips(items,cId,arr,bId){
var c=document.getElementById(cId);c.innerHTML='';
items.forEach(function(item){
var d=document.createElement('div');d.className='chip';
d.innerHTML='<span>'+item.emoji+'</span> '+item.label;
d.onclick=function(){
var i=arr.indexOf(item.id);
if(i>=0){arr.splice(i,1);d.classList.remove('selected')}
else{arr.push(item.id);d.classList.add('selected')}
document.getElementById(bId).disabled=arr.length===0;
};
c.appendChild(d);
});
}
function switchScreen(toId){
document.querySelectorAll('.screen').forEach(function(s){s.style.display='none';s.classList.remove('active')});
var el=document.getElementById(toId);
if(el){el.style.display='block';el.classList.add('active');}
window.scrollTo(0,0);
}
function goStep(n){
switchScreen(n===1?'step1':'step2');
if(n===1)renderChips(WHO,'whoChips',selWho,'btn1');
if(n===2)renderChips(WHAT,'whatChips',selWhat,'btn2');
}
function showResults(){
switchScreen('loadingScreen');
setTimeout(function(){
var scored=AREAS.map(function(a){
var score=0;
selWho.forEach(function(w){if(a.who.indexOf(w)>=0)score+=2});
selWhat.forEach(function(w){if(a.what.indexOf(w)>=0)score+=1});
var max=selWho.length*2+selWhat.length;
return{name:a.name,score:score,pct:Math.round(score/max*100),who_text:a.who_text,desc:a.desc,places:a.places,guide:a.guide,island:a.island||false};
}).sort(function(a,b){if(b.pct!==a.pct)return b.pct-a.pct;if(a.island!==b.island)return a.island?1:-1;return 0}).slice(0,3);
switchScreen('resultScreen');
TRACK_DATA.whoSelected=selWho.join(',');
TRACK_DATA.whatSelected=selWhat.join(',');
TRACK_DATA.result1=scored[0]?scored[0].name:'';
TRACK_DATA.result1pct=scored[0]?scored[0].pct+'%':'';
TRACK_DATA.result2=scored[1]?scored[1].name:'';
TRACK_DATA.result3=scored[2]?scored[2].name:'';
sendTrack();
var c=document.getElementById('resultsContainer');c.innerHTML='';
scored.forEach(function(a,i){
c.innerHTML+='<div class="result-card"><div class="result-num">#'+(i+1)+'</div><div class="result-name">'+a.name+'</div><div class="result-match">'+a.pct+'% توافق</div><div class="result-bar"><div class="result-bar-fill" style="width:0%" data-w="'+a.pct+'%"></div></div><div class="result-who">'+a.who_text+'</div><div class="result-desc">'+a.desc+'</div><div class="result-places">'+a.places.map(function(p){return'<div class="result-place">'+p+'</div>'}).join('')+'</div><div style="margin-top:14px"><button class="btn btn-primary" onclick="openGuide(\'' + a.guide + '\')" style="padding:12px 20px;font-size:13px;background:rgba(42,107,90,0.08);color:#2a6b5a;border:1px solid rgba(42,107,90,0.12)">Гайд по '+a.name+' <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg></button></div></div>';
});
setTimeout(function(){document.querySelectorAll('.result-bar-fill').forEach(function(b){b.style.width=b.dataset.w})},100);
/* Trips section */
var tripsHtml='<div style="margin-top:24px;padding-top:20px;border-top:1px solid rgba(0,0,0,0.06)"><div style="font-size:13px;font-weight:600;color:rgba(42,107,90,0.7);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px">رحلات يومية (1-3 أيام)</div>';

},2000);

/* ========== OPEN GUIDE → REDIRECT ========== */
function openGuide(guide){
  try {
    var cards = document.querySelectorAll('.result-card');
    var results = [];
    cards.forEach(function(card) {
      var name = card.querySelector('.result-name') || card.querySelector('div[style*="font-size:16px"]');
      var pct = card.querySelector('.result-match');
      if (name) results.push({name: name.textContent, pct: pct ? pct.textContent : ''});
    });
    localStorage.setItem('quizResults', JSON.stringify({
      districts: results,
      selWho: selWho,
      selWhat: selWhat,
      resultsHTML: document.getElementById('resultsContainer').parentElement.innerHTML
    }));
  } catch(e) { console.error('Error saving quiz results', e); }
  window.location.href='guide-'+guide+'.html';
}
function shareResults(){
var text='مرحبا! أفضل مناطقي في بالي:\n\nاكتشف منطقتك 👉 https://t.me/balidreamphoto_bot';
if(navigator.share){navigator.share({text:text}).catch(function(){})}
else{navigator.clipboard.writeText(text).then(function(){alert('تم النسخ!')})}
}
/* ========== INIT ========== */
document.addEventListener('DOMContentLoaded',function(){
var l=document.getElementById('loadingIndicator');if(l)l.style.display='none';
/* Restore from localStorage if returning from guide */
if(window.location.hash==='#results'){var saved=localStorage.getItem('quizResults');if(saved){try{var data=JSON.parse(saved);if(data.selWho)selWho=data.selWho;if(data.selWhat)selWhat=data.selWhat;if(selWho.length>0&&selWhat.length>0){showResults();}}catch(e){}}}
if(window.Telegram&&Telegram.WebApp){Telegram.WebApp.ready();Telegram.WebApp.expand();}
});
</script>
