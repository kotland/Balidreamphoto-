<div style="padding:0 20px 20px;">
<input type="text" id="baseSearch" placeholder="🔍 Найти (напр. 'оле', 'касты')" style="width:100%;padding:12px 16px;border:1px solid rgba(42,107,90,0.2);border-radius:12px;font-size:14px;background:#f8f6f2;color:#2a2a28;outline:none;">
</div>
<script>
document.getElementById('baseSearch').addEventListener('input', function(e) {
    const term = e.target.value.toLowerCase();
    const sections = document.querySelectorAll('.section');
    sections.forEach(s => {
        const text = s.textContent.toLowerCase();
        const body = s.querySelector('.section-body');
        const arrow = s.querySelector('.arrow');
        if (text.includes(term)) {
            s.style.display = 'block';
            if (term.length > 2) {
                body.style.display = 'block';
                if(arrow) arrow.style.transform = 'rotate(180deg)';
            } else if (term.length === 0) {
                body.style.display = 'none';
                if(arrow) arrow.style.transform = 'rotate(0deg)';
            }
        } else {
            s.style.display = 'none';
        }
    });
});
</script>

</div>
