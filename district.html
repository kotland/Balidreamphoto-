<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Район · Гайд · Где свои на Бали</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css?v=1774488851">
    <style>
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
    </style>
</head>
<body>

<div id="districtLoader" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(248,246,242,0.9);backdrop-filter:blur(5px);z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;transition:opacity 0.5s;">
    <img src="img/star1.png" alt="Loading" style="width:140px;height:140px;margin-bottom:20px;animation:pulse 2s infinite ease-in-out;">
    <h1 style="font-family:'Playfair Display',serif;font-size:24px;margin-bottom:8px;color:#2a6b5a;text-align:center;">Собираем маршруты...</h1>
    <p style="color:rgba(42,42,40,0.5);text-align:center;">Связываемся с базой данных</p>
</div>

<div class="grad1"></div><div class="grad2"></div><div class="grad3"></div>
<div class="app">
    <button class="btn btn-primary back-home-btn" onclick="window.location.href='guides.html#results'" style="font-size:13px;padding:8px 16px;background:rgba(42,107,90,0.06);color:#2a6b5a;border:1px solid rgba(42,107,90,0.1)">← Назад к выбору районов</button>

    <div id="guideContent" style="display:block;overflow-y:auto;padding-bottom:80px;text-align:center;">
        <h1 id="districtTitle">Загрузка...</h1>
        <p class="sub">Полный гайд по району · @balidreamphoto</p>
        
        <div id="routesListContainer" style="text-align:left;">
            <div style="padding:20px; color:rgba(42,42,40,0.5);">Загрузка маршрутов...</div>
        </div>
        
        <div class="footer-guide">@balidreamphoto · Гайд по районам Бали · 2026</div>
        <div style="margin:20px 0 40px">
            <button class="btn btn-primary" onclick="window.location.href='guides.html#results'" style="padding:14px 28px;border-radius:14px;width:100%">← Назад к выбору районов</button>
        </div>
    </div>

    <div id="routeScreen" style="display:none;padding-bottom:80px"></div>

</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
