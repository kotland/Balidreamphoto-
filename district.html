<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<body>


<style>
    @keyframes blobShape {
        0% { border-radius: 50%; transform: scale(1) translate(0, 0); }
        33% { border-radius: 48% 52% 50% 50% / 50% 49% 51% 50%; transform: scale(1.02) translate(1px, -2px); }
        66% { border-radius: 51% 49% 49% 51% / 49% 51% 48% 52%; transform: scale(0.98) translate(-1px, 2px); }
        100% { border-radius: 50%; transform: scale(1) translate(0, 0); }
    }
    @keyframes blobBlink {
        0%, 95%, 98% { transform: scaleY(1); }
        96% { transform: scaleY(0.1); }
    }
    @keyframes blobSmile {
        0%, 100% { border-bottom-width: 4px; transform: translateY(0); }
        50% { border-bottom-width: 5px; transform: translateY(-1px); }
    }
    .blob-container {
        width: 140px;
        height: 140px;
        background-color: #ffd1b8;
        background: -webkit-radial-gradient(30% 30%, circle, #ffd1b8 0%, #ffb8c5 40%, #c1d8f5 80%, #f4f8ff 100%);
        background: radial-gradient(circle at 30% 30%, #ffd1b8 0%, #ffb8c5 40%, #c1d8f5 80%, #f4f8ff 100%);
        animation: blobShape 4s ease-in-out infinite;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 15px 30px rgba(180, 200, 255, 0.4), 
                    inset -10px -10px 20px rgba(255, 255, 255, 0.8),
                    inset 8px 8px 15px rgba(255, 210, 200, 0.6);
        margin: 0 auto 32px auto;
        z-index: 100;
    }
    .blob-face {
        position: absolute;
        top: 50%;
        left: 53%;
        transform: translate(-50%, -50%);
        width: 55px;
        height: 25px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
    }
    .blob-eyes {
        width: 100%;
        display: flex;
        justify-content: space-between;
        padding: 0 4px;
        box-sizing: border-box;
    }
    .blob-eye {
        width: 10px;
        height: 14px;
        background: #1a1a1a;
        border-radius: 50%;
        animation: blobBlink 5s infinite;
        transform-origin: center;
    }
    .blob-mouth {
        width: 14px;
        height: 8px;
        border-bottom: 4px solid #1a1a1a;
        border-radius: 0 0 14px 14px;
        margin-top: 4px;
        animation: blobSmile 3s ease-in-out infinite;
    }
    #loaderOverlay {
        background: linear-gradient(180deg, #eaf2ff 0%, #ffffff 100%) !important;
    }
</style>
<div id="loaderOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:99999; display:flex; flex-direction:column; align-items:center; justify-content:center; transition: opacity 0.5s ease;">
    <div class="blob-container">
        <div class="blob-face">
            <div class="blob-eyes">
                <div class="blob-eye"></div>
                <div class="blob-eye"></div>
            </div>
            <div class="blob-mouth"></div>
        </div>
    </div>
    </div>
    <div style="margin-top:40px; font-weight:800; color:#1a1a1a; font-size:20px; letter-spacing:0.5px;">Загружаем магию...</div>
    <div style="margin-top:8px; font-weight:500; color:#666; font-size:14px;">Ищем лучшие места для вас</div>
</div>

    <div style="margin-top:32px; font-weight:800; color:#2a2a28; font-size:18px; letter-spacing:0.5px;">Загружаем магию...</div>
    <div style="margin-top:8px; font-weight:500; color:#888; font-size:13px;">Ищем лучшие места для вас</div>
</div>


<div id="districtLoader" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(248,246,242,0.9);backdrop-filter:blur(5px);z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;">
    <div style="font-size:48px;margin-bottom:20px;animation:spin 2s linear infinite;">⏳</div>
    <h1 style="font-family:'Playfair Display',serif;font-size:24px;margin-bottom:8px;color:#2a6b5a;text-align:center;">Собираем маршруты...</h1>
    <p style="color:rgba(42,42,40,0.5);text-align:center;">Связываемся с базой данных</p>
    <style>@keyframes spin { 100% { transform:rotate(360deg); } }</style>
</div>

<div class="grad1"></div><div class="grad2"></div><div class="grad3"></div>
<div class="app">
    <button class="btn btn-primary back-home-btn" onclick="window.location.href='guides.html#results'" style="font-size:13px;padding:8px 16px;background:rgba(42,107,90,0.06);color:#2a6b5a;border:1px solid rgba(42,107,90,0.1)">← Назад к выбору районов</button>

    <div id="guideContent" style="display:block;overflow-y:auto;padding-bottom:80px;text-align:center;">

            <div style="padding:20px; color:rgba(42,42,40,0.5);">Загрузка маршрутов...</div>

        </div>
    </div>

    <div id="routeScreen" style="display:none;padding-bottom:80px"></div>

</div>
