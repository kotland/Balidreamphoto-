<style>
    @keyframes blobShape {
        0% { border-radius: 50%; transform: scale(1) translate(0, 0); }
        33% { border-radius: 48% 52% 50% 50% / 50% 49% 51% 50%; transform: scale(1.02) translate(1px, -2px); }
        66% { border-radius: 51% 49% 49% 51% / 49% 51% 48% 52%; transform: scale(0.98) translate(-1px, 2px); }
        100% { border-radius: 50%; transform: scale(1) translate(0, 0); }
    }
    @keyframes blobBlink {
        0%, 95%, 98% { transform: scaleY(1); }
        96% { transform: scaleY(0.1); }
    }
    @keyframes blobSmile {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-2px); }
    }
    .blob-container {
        width: 140px;
        height: 140px;
        background-color: #ffd1b8;
        background: -webkit-radial-gradient(30% 30%, circle, #ffd1b8 0%, #ffb8c5 40%, #c1d8f5 80%, #f4f8ff 100%);
        background: radial-gradient(circle at 30% 30%, #ffd1b8 0%, #ffb8c5 40%, #c1d8f5 80%, #f4f8ff 100%);
        animation: blobShape 4s ease-in-out infinite;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 20px 50px rgba(180, 200, 255, 0.5), 
                    inset -15px -15px 30px rgba(255, 255, 255, 0.8),
                    inset 10px 10px 25px rgba(255, 210, 200, 0.6);
        margin: 0 auto 32px auto;
    }
        33% { transform: translateX(-48%) rotate(8deg) translateY(-2px); }
        66% { transform: translateX(-52%) rotate(2deg) translateY(1px); }
        100% { transform: translateX(-50%) rotate(5deg) translateY(0); }
    }
    .blob-face {
        position: absolute;
        top: 50%;
        left: 53%;
        transform: translate(-50%, -50%);
        width: 70px;
        height: 35px;
    }
    .blob-eye {
        transform-origin: 50% 20px;
        animation: blobBlink 5s infinite;
    }
    .left-eye { transform: rotate(5deg); transform-origin: 19px 20px; }
    .right-eye { transform: rotate(-5deg); transform-origin: 81px 20px; }
    .blob-mouth {
        animation: blobSmile 3s ease-in-out infinite;
        transform-origin: 50% 35px;
    }
</style>
