<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Район · Гайд · Где свои на Бали</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css?v=1774488851">
</head>
<body>

<style>
    @keyframes blobShape {
        0% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; transform: scale(1) rotate(0deg); }
        34% { border-radius: 70% 30% 50% 50% / 30% 30% 70% 70%; transform: scale(1.05) rotate(5deg); }
        67% { border-radius: 100% 60% 60% 100% / 100% 100% 60% 60%; transform: scale(0.95) rotate(-5deg); }
        100% { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; transform: scale(1) rotate(0deg); }
    }
    @keyframes blobGradient {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }
    @keyframes blobBlink {
        0%, 96%, 98% { transform: scaleY(1); }
        97% { transform: scaleY(0.1); }
    }
    @keyframes blobSmile {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-2px) rotate(3deg); }
    }
    @keyframes fadeOutLoader {
        from { opacity: 1; visibility: visible; }
        to { opacity: 0; visibility: hidden; }
    }
    .blob-container {
        width: 120px;
        height: 120px;
        background: linear-gradient(135deg, #ffc3a0 0%, #ffafbd 50%, #ffc3a0 100%);
        background-size: 200% 200%;
        animation: blobShape 6s ease-in-out infinite, blobGradient 4s ease infinite;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 30px rgba(255, 175, 189, 0.4);
    }
    .blob-face {
        position: relative;
        width: 60px;
        height: 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-end;
    }
    .blob-eyes {
        width: 100%;
        display: flex;
        justify-content: space-between;
        padding: 0 8px;
        box-sizing: border-box;
        margin-bottom: 6px;
    }
    .blob-eye {
        width: 12px;
        height: 12px;
        background: #2a2a28;
        border-radius: 50%;
        animation: blobBlink 4s infinite;
    }
    .blob-mouth {
        width: 24px;
        height: 12px;
        border-bottom: 4px solid #2a2a28;
        border-radius: 0 0 20px 20px;
        animation: blobSmile 3s ease-in-out infinite;
    }
</style>
<div id="loaderOverlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(253,251,251,0.95); z-index:99999; display:flex; flex-direction:column; align-items:center; justify-content:center; backdrop-filter:blur(12px); transition: opacity 0.5s ease;">
    <div class="blob-container">
        <div class="blob-face">
            <div class="blob-eyes">
                <div class="blob-eye"></div>
                <div class="blob-eye"></div>
            </div>
            <div class="blob-mouth"></div>
        </div>
    </div>
    <div style="margin-top:32px; font-weight:800; color:#2a2a28; font-size:18px; letter-spacing:0.5px;">Загружаем магию...</div>
    <div style="margin-top:8px; font-weight:500; color:#888; font-size:13px;">Ищем лучшие места для вас</div>
</div>


<div id="districtLoader" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(248,246,242,0.9);backdrop-filter:blur(5px);z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;">
    <div style="font-size:48px;margin-bottom:20px;animation:spin 2s linear infinite;">⏳</div>
    <h1 style="font-family:'Playfair Display',serif;font-size:24px;margin-bottom:8px;color:#2a6b5a;text-align:center;">Собираем маршруты...</h1>
    <p style="color:rgba(42,42,40,0.5);text-align:center;">Связываемся с базой данных</p>
    <style>@keyframes spin { 100% { transform:rotate(360deg); } }</style>
</div>

<div class="grad1"></div><div class="grad2"></div><div class="grad3"></div>
<div class="app">
    <button class="btn btn-primary back-home-btn" onclick="window.location.href='guides.html#results'" style="font-size:13px;padding:8px 16px;background:rgba(42,107,90,0.06);color:#2a6b5a;border:1px solid rgba(42,107,90,0.1)">← Назад к выбору районов</button>

    <div id="guideContent" style="display:block;overflow-y:auto;padding-bottom:80px;text-align:center;">
        <h1 id="districtTitle">Загрузка...</h1>
        <p class="sub">Полный гайд по району · @balidreamphoto</p>
        
        <div id="routesListContainer" style="text-align:left;">
            <div style="padding:20px; color:rgba(42,42,40,0.5);">Загрузка маршрутов...</div>
        </div>
        
        <div class="footer-guide">@balidreamphoto · Гайд по районам Бали · 2026</div>
        <div style="margin:20px 0 40px">
            <button class="btn btn-primary" onclick="window.location.href='guides.html#results'" style="padding:14px 28px;border-radius:14px;width:100%">← Назад к выбору районов</button>
        </div>
    </div>

    <div id="routeScreen" style="display:none;padding-bottom:80px"></div>

</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
